name: Publish v0.2.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-v0.2.0.yml"

permissions:
  contents: write
  actions: write
  statuses: write

concurrency:
  group: publish-v0.2.0
  cancel-in-progress: true

jobs:
  publish:
    name: Create verified tag and dispatch release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish pending status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/publisher-status.json
          import json
          import os

          print(json.dumps({
              "state": "pending",
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": "Athanor v0.2.0 publisher running",
              "context": "athanor/release-publisher",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @/tmp/publisher-status.json

      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: b415bfde28af94efdae11e1228ea3b467903dbaa
          fetch-depth: 0
          persist-credentials: true

      - name: Revalidate candidate and release contract
        id: validate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_SHA: b415bfde28af94efdae11e1228ea3b467903dbaa
          RELEASE_TAG: v0.2.0
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          grep -Fx 'version = "0.2.0"' apps/ath/Cargo.toml
          grep -Fx 'version = "0.2.0"' apps/athd/Cargo.toml
          grep -Fx '## [0.2.0] - 2026-07-22' CHANGELOG.md
          python3 scripts/verify_release_version.py \
            --tag "$RELEASE_TAG" \
            --changelog CHANGELOG.md \
            --notes-output /tmp/release-notes.md \
            apps/ath/Cargo.toml \
            apps/athd/Cargo.toml
          test -s /tmp/release-notes.md

          curl --fail-with-body --location --silent --show-error \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/commits/$CANDIDATE_SHA/status" \
            > /tmp/status.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          required = {
              "athanor/verification-matrix",
              "athanor/appsec",
              "athanor/store-conformance",
          }
          payload = json.loads(Path("/tmp/status.json").read_text(encoding="utf-8"))
          latest = {}
          for status in payload.get("statuses", []):
              latest.setdefault(status["context"], status["state"])
          assert {name: latest.get(name) for name in required} == {
              name: "success" for name in required
          }, latest
          PY

          git fetch origin --tags
          test ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null

      - name: Create immutable annotated tag
        id: tag
        shell: bash
        env:
          CANDIDATE_SHA: b415bfde28af94efdae11e1228ea3b467903dbaa
          RELEASE_TAG: v0.2.0
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$CANDIDATE_SHA" -m "Athanor 0.2.0"
          test "$(git rev-parse "$RELEASE_TAG^{}")" = "$CANDIDATE_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Dispatch tag-bound release workflow
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/release.yml/dispatches" \
            --data '{"ref":"v0.2.0"}'

      - name: Publish terminal status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          TAG_OUTCOME: ${{ steps.tag.outcome }}
          DISPATCH_OUTCOME: ${{ steps.dispatch.outcome }}
        run: |
          set -euo pipefail
          state="success"
          description="Athanor v0.2.0 tag created and release dispatched"
          for outcome in "$VALIDATE_OUTCOME" "$TAG_OUTCOME" "$DISPATCH_OUTCOME"; do
            if [[ "$outcome" != "success" ]]; then
              state="failure"
              description="Athanor v0.2.0 publisher failed"
              break
            fi
          done
          export STATE="$state"
          export DESCRIPTION="$description"
          python3 - <<'PY' > /tmp/publisher-status.json
          import json
          import os

          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/release-publisher",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @/tmp/publisher-status.json
