name: Store Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: store-conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release-lock:
    name: Synchronize prepared release lockfile
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      - name: Update only ath and athd lock entries
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'version = "0.2.0"' apps/ath/Cargo.toml
          grep -Fx 'version = "0.2.0"' apps/athd/Cargo.toml
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Cargo.lock")
          before = path.read_text(encoding="utf-8").splitlines(keepends=True)
          after = before.copy()
          package = None
          versions = {}
          changed = {}

          for index, line in enumerate(before):
              stripped = line.strip()
              if stripped == "[[package]]":
                  package = None
              elif stripped.startswith('name = "') and stripped.endswith('"'):
                  package = stripped.removeprefix('name = "').removesuffix('"')
              elif package in {"ath", "athd"} and stripped.startswith('version = "'):
                  versions[package] = stripped.removeprefix('version = "').removesuffix('"')
                  if versions[package] == "0.1.0":
                      newline = "\n" if line.endswith("\n") else ""
                      after[index] = 'version = "0.2.0"' + newline
                      changed[package] = index
                  elif versions[package] != "0.2.0":
                      raise AssertionError((package, versions[package]))
                  package = None

          assert versions.keys() == {"ath", "athd"}, versions
          assert set(changed) in ({"ath", "athd"}, set()), changed
          changed_indexes = set(changed.values())
          assert all(
              old == new or index in changed_indexes
              for index, (old, new) in enumerate(zip(before, after, strict=True))
          )
          path.write_text("".join(after), encoding="utf-8")
          PY
      - name: Commit synchronized lockfile
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "build: synchronize 0.2.0 release lockfile [skip ci]"
          git push origin HEAD:main

  backend:
    name: Store contract / ${{ matrix.backend }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: memory
            package: athanor-store-memory
          - backend: jsonl
            package: athanor-store-jsonl
          - backend: surrealdb-embedded
            package: athanor-store-surrealdb
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: store-conformance-${{ matrix.backend }}
      - name: Run backend contract suite
        run: cargo test -p "${{ matrix.package }}" --locked

  surrealdb-remote:
    name: Store contract / surrealdb-remote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: store-conformance-surrealdb-remote
      - name: Start SurrealDB 2.6.5 test server
        shell: bash
        run: |
          docker run --detach --rm \
            --name athanor-surrealdb \
            --publish 8000:8000 \
            surrealdb/surrealdb:v2.6.5 \
            start --log warn --unauthenticated --bind 0.0.0.0:8000 memory
      - name: Wait for SurrealDB health endpoint
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs athanor-surrealdb
          exit 1
      - name: Run remote two-connection contract
        id: remote-contract
        shell: bash
        env:
          ATHANOR_SURREAL_REMOTE_URI: ws://127.0.0.1:8000
        run: |
          set -o pipefail
          cargo test -p athanor-store-surrealdb --features remote --test remote --locked -- --ignored --nocapture \
            2>&1 | tee "$RUNNER_TEMP/surrealdb-remote.log"
      - name: Capture SurrealDB logs
        if: always()
        shell: bash
        run: docker logs athanor-surrealdb 2>&1 | tee "$RUNNER_TEMP/surrealdb-server.log" || true
      - name: Upload remote conformance diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: surrealdb-remote-diagnostics
          path: |
            ${{ runner.temp }}/surrealdb-remote.log
            ${{ runner.temp }}/surrealdb-server.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop SurrealDB test server
        if: always()
        run: docker rm --force athanor-surrealdb || true

  exact-status:
    name: Exact Store Conformance status
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [backend, surrealdb-remote]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    env:
      BACKEND_RESULT: ${{ needs.backend.result }}
      REMOTE_RESULT: ${{ needs.surrealdb-remote.result }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish exact Store Conformance status
        shell: bash
        run: |
          set -euo pipefail
          state="success"
          description="Athanor store conformance passed"
          if [[ "$BACKEND_RESULT" != "success" || "$REMOTE_RESULT" != "success" ]]; then
            state="failure"
            description="Athanor store conformance failed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > store-conformance-status.json
          import json
          import os

          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/store-conformance",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @store-conformance-status.json
