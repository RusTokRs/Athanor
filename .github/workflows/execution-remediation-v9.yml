name: Execution Remediation V9

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/execution-remediation-v9.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: execution-remediation-v9-main
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply and validate remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          workflow = Path(".github/workflows/execution-remediation-v8.yml").read_text()

          allowed_marker = '          cat > "$allowed" <<\'EOF\'\n'
          allowed_start = workflow.index(allowed_marker) + len(allowed_marker)
          allowed_end = workflow.index("\n          EOF", allowed_start)
          allowed = {
              line.strip()
              for line in workflow[allowed_start:allowed_end].splitlines()
              if line.strip()
          }
          allowed.add(".github/workflows/execution-remediation-v9.yml")
          Path(os.environ["RUNNER_TEMP"]).joinpath("allowed-paths").write_text(
              "\n".join(sorted(allowed)) + "\n"
          )

          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])
          script = script.replace(
              '''if retention_guard_text.count("current::") != 1:
              raise SystemExit("retention_guard: expected one current:: call")
          Path(retention_guard).write_text(retention_guard_text.replace("current::", "retention::", 1))''',
              '''if retention_guard_text.count("current::") != 2:
              raise SystemExit("retention_guard: expected two current:: calls")
          Path(retention_guard).write_text(retention_guard_text.replace("current::", "retention::"))''',
              1,
          )
          script = script.replace(
              '''if guard_text.count("current::") != 1:
              raise SystemExit("guard: expected one current:: call")
          Path(guard).write_text(guard_text.replace("current::", "pointer::", 1))''',
              '''if guard_text.count("current::") != 2:
              raise SystemExit("guard: expected two current:: calls")
          Path(guard).write_text(guard_text.replace("current::", "pointer::"))''',
              1,
          )
          exec(compile(script, "execution-remediation-v9", "exec"))
          Path(".github/workflows/execution-remediation-v9.yml").unlink()
          PY
            cargo update -p oxc_parser@0.138.0 --precise 0.139.0
            cargo fmt --all
            cargo fmt --all -- --check
            cargo check --workspace --all-features --locked
            cargo test -p ath --test executable_shared_report_cli --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/execution-remediation-v9.log"
      - name: Upload remediation diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: execution-remediation-v9-diagnostics
          path: ${{ runner.temp }}/execution-remediation-v9.log
          if-no-files-found: error
          retention-days: 14
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): close execution blockers"
          git push origin HEAD:main
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Execution remediation v9 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Execution remediation v9 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/execution-remediation-v9",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
