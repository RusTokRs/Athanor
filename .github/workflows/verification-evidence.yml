name: Verification Evidence

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: verification-evidence-main
  cancel-in-progress: false

jobs:
  record:
    name: Record successful main verification
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Record exact CI evidence
        shell: bash
        env:
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
          VERIFIED_RUN_ID: ${{ github.event.workflow_run.id }}
          VERIFIED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          VERIFIED_COMPLETED_AT: ${{ github.event.workflow_run.updated_at }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = {
              "schema": "athanor.verification_evidence.v1",
              "workflow": "CI",
              "head_sha": os.environ["VERIFIED_SHA"],
              "run_id": int(os.environ["VERIFIED_RUN_ID"]),
              "run_url": os.environ["VERIFIED_RUN_URL"],
              "conclusion": "success",
              "completed_at": os.environ["VERIFIED_COMPLETED_AT"],
              "matrix": [
                  "cargo-deny check",
                  "cargo fmt --all -- --check",
                  "cargo test --workspace --quiet --locked",
                  "cargo clippy --workspace --all-targets --locked -- -D warnings",
                  "cargo run -p ath --quiet --locked -- index .",
                  "cargo run -p ath --quiet --locked -- docs check",
                  "feature matrix: default, store-surreal, js-ts-precision, all-features",
                  "source coverage baseline",
              ],
          }
          path = Path("docs/development/verification-evidence.json")
          path.write_text(json.dumps(evidence, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit evidence to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/development/verification-evidence.json; then
            exit 0
          fi
          git add docs/development/verification-evidence.json
          git commit -m "chore(verification): record CI evidence [skip ci]"
          git push origin HEAD:main
