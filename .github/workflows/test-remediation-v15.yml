name: Test Remediation V15

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v15.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v15-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "bb2fc9a14f081c0d439feb58a92082431f34ba24:"
                  ".github/workflows/test-remediation-v14.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])

          loop_start = script.index("loop_anchor = '''")
          chain_start = script.index("chain_anchor = '''", loop_start)
          robust_loop = r'''loop_line = "        for schema in extract_schema_literals(production_prefix(&source)) {\n"
          if json_text.count(loop_line) != 1:
              raise SystemExit(
                  "json inventory: observed schema loop line missing, "
                  f"found {json_text.count(loop_line)}"
              )
          loop_replacement = loop_line + (
              "            if validate_schema_id(&schema).is_err()\n"
              "                && !classified.contains(schema.as_str())\n"
              "            {\n"
              "                continue;\n"
              "            }\n"
          )
          json_text = json_text.replace(loop_line, loop_replacement, 1)

          '''
          script = script[:loop_start] + robust_loop + script[chain_start:]

          chain_start = script.index("chain_anchor = '''")
          contract_start = script.index("\n\ncontract_doc =", chain_start)
          robust_chain = r'''classified_start = json_text.index("fn classified_schemas() -> BTreeSet<&'static str> {")
          collect_at = json_text.index("        .collect()", classified_start)
          source_chain = (
              "        .chain(\n"
              "            SOURCE_LITERAL_JSON_CONTRACTS\n"
              "                .iter()\n"
              "                .map(|contract| contract.schema),\n"
              "        )\n"
          )
          json_text = json_text[:collect_at] + source_chain + json_text[collect_at:]
          json_inventory.write_text(json_text)
          '''
          script = script[:chain_start] + robust_chain + script[contract_start:]

          exec(
              compile(script, "test-remediation-v15", "exec"),
              {"__builtins__": __builtins__},
          )

          contract_doc = Path("docs/development/json-contract-inventory.md")
          contract_text = contract_doc.read_text()
          old_doc = (
              "are not schema ids and are excluded only after\n"
              "`validate_schema_id` rejects them."
          )
          new_doc = (
              "are not schema ids and are excluded only when they are not explicitly classified and\n"
              "`validate_schema_id` rejects them. Registered legacy ids remain observable."
          )
          if contract_text.count(old_doc) != 1:
              raise SystemExit(
                  "json contract guide: expected one non-schema scanner explanation"
              )
          contract_doc.write_text(contract_text.replace(old_doc, new_doc, 1))

          Path(".github/workflows/test-remediation-v15.yml").unlink()
          PY
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v15.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          .github/workflows/test-remediation-v14.yml
          .github/workflows/test-remediation-v15.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          docs/development/json-contract-inventory.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "test(app): align deterministic publication and cancellation fixtures"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v15-diagnostics
          path: ${{ runner.temp }}/test-remediation-v15.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V15 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V15 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v15",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
