name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: api-001-rustfmt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt-diagnostic:
    name: Capture exact Rust 1.95 formatting
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Materialize canonical formatting patch
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          git diff --binary -- . ':(exclude).github/workflows/ci.yml' > "$RUNNER_TEMP/rustfmt.patch"
          test -s "$RUNNER_TEMP/rustfmt.patch"
      - name: Upload canonical formatting patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-001-rustfmt-patch
          path: ${{ runner.temp }}/rustfmt.patch
          if-no-files-found: error
          retention-days: 14
