name: API Protocol Source Publisher
# Activation for the registered CI workflow path.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: api-protocol-source-publisher-main
  cancel-in-progress: true

jobs:
  publish:
    name: Apply and validate canonical API protocol identity
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=athanor/api-protocol-slice \
            -f description="Canonical API protocol slice is running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Apply exact source slice
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD:.github/scripts/api_protocol_slice.py)" = "f3169b667373e42630a67daa1aa4371961149f66"
          python .github/scripts/api_protocol_slice.py --publish
          git show ca54b1a0a8f5cbc48b90d4cd0ed74b7a63954c6a:.github/workflows/ci.yml > .github/workflows/ci.yml
          cargo fmt --all
          cargo fmt --all -- --check
          git diff --check

          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/scripts/api_protocol_slice.py
          .github/workflows/api-protocol-slice.yml
          .github/workflows/ci.yml
          athanor_implementation_plan_ru.md
          crates/athanor-app/tests/documentation_status_inventory.rs
          crates/athanor-checker-api/src/lib.rs
          crates/athanor-extractor-openapi/src/lib.rs
          docs/adapters/checker-api.md
          docs/adapters/extractor-graphql.md
          docs/development/roadmap-status.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          unexpected="$(comm -23 "$RUNNER_TEMP/actual-paths" "$RUNNER_TEMP/allowed-paths")"
          if [[ -n "$unexpected" ]]; then
            echo "unexpected source paths:" >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Run targeted regressions
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p athanor-extractor-openapi --locked
          cargo test -p athanor-checker-api --locked
          cargo test -p athanor-app --test documentation_status_inventory --locked
          cargo run -p ath --quiet --locked -- docs check

      - name: Publish validated source branch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(api): canonicalize cross-protocol identities"
          git push --force origin HEAD:refs/heads/automation/api-protocol-source

      - name: Publish final status
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description="Canonical API protocol slice failed"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Canonical API protocol source branch published"
          fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context=athanor/api-protocol-slice \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          test "$state" = success
