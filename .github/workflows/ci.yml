name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/development/verification-evidence.json"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security & License Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check

  quality:
    name: Rust 1.95 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@81507be746c04af74ed35958a57969a1cfe076b5 # 1.100.0
        with:
          toolchain: "1.95.0"
          components: clippy, rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run workspace tests
        run: cargo test --workspace --quiet --locked
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test Linux installer checksum verification
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test_dir="$(mktemp -d)"
          trap 'rm -rf "$test_dir"' EXIT
          cp install.sh "$test_dir/"
          printf 'ath-test\n' > "$test_dir/ath"
          printf 'athd-test\n' > "$test_dir/athd"
          (cd "$test_dir" && sha256sum ath athd > SHA256SUMS)
          ATHANOR_INSTALL_DIR="$test_dir/install" "$test_dir/install.sh"
          cmp "$test_dir/ath" "$test_dir/install/ath"
          cmp "$test_dir/athd" "$test_dir/install/athd"
          printf 'tampered\n' >> "$test_dir/ath"
          if ATHANOR_INSTALL_DIR="$test_dir/rejected" "$test_dir/install.sh"; then
            echo "tampered Linux binary was accepted" >&2
            exit 1
          fi
      - name: Test Windows installer checksum verification
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testDir = Join-Path $env:RUNNER_TEMP "athanor-installer-test"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $testDir
          New-Item -ItemType Directory -Force $testDir | Out-Null
          Copy-Item install.ps1 $testDir
          Set-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "ath-test" -Encoding ascii
          Set-Content -LiteralPath (Join-Path $testDir "athd.exe") -Value "athd-test" -Encoding ascii
          $manifest = foreach ($file in @("ath.exe", "athd.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $manifest | Set-Content -LiteralPath (Join-Path $testDir "SHA256SUMS") -Encoding ascii
          & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "install")
          foreach ($file in @("ath.exe", "athd.exe")) {
            $sourceHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash
            $installedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path (Join-Path $testDir "install") $file)).Hash
            if ($sourceHash -ne $installedHash) {
              throw "installed file differs: $file"
            }
          }
          Add-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "tampered" -Encoding ascii
          $rejected = $false
          try {
            & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "rejected")
          } catch {
            $rejected = $true
          }
          if (-not $rejected) {
            throw "tampered Windows binary was accepted"
          }
      - name: Run indexing smoke test
        run: cargo run -p ath --quiet --locked -- index .
      - name: Check editable documentation
        run: cargo run -p ath --quiet --locked -- docs check

  feature-matrix:
    name: Feature matrix / ${{ matrix.features }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        features:
          - default
          - store-surreal
          - js-ts-precision
          - all-features
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@81507be746c04af74ed35958a57969a1cfe076b5 # 1.100.0
        with:
          toolchain: "1.95.0"
          components: clippy
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Check feature graph
        shell: bash
        run: |
          case "${{ matrix.features }}" in
            default) FEATURES="" ;;
            all-features) FEATURES="--all-features" ;;
            *) FEATURES="--features ${{ matrix.features }}" ;;
          esac
          cargo check --workspace ${FEATURES} --locked
          cargo test --workspace --quiet ${FEATURES} --locked
          cargo clippy --workspace --all-targets ${FEATURES} --locked -- -D warnings

  coverage:
    name: Source coverage baseline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@81507be746c04af74ed35958a57969a1cfe076b5 # 1.100.0
        with:
          toolchain: "1.95.0"
          components: llvm-tools-preview
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Generate coverage reports
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --locked --lcov --output-path coverage/lcov.info
          cargo llvm-cov report --json --summary-only --output-path coverage/summary.json
          cargo llvm-cov report --html --output-dir coverage/html
      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-source-coverage
          path: coverage/
          if-no-files-found: error
          retention-days: 14

  verification-status:
    name: Exact verification status
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [security, quality, feature-matrix, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    env:
      SECURITY_RESULT: ${{ needs.security.result }}
      QUALITY_RESULT: ${{ needs.quality.result }}
      FEATURE_RESULT: ${{ needs.feature-matrix.result }}
      COVERAGE_RESULT: ${{ needs.coverage.result }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish exact matrix status
        shell: bash
        run: |
          set -euo pipefail
          state="success"
          description="Athanor verification matrix passed"
          for result in \
            "$SECURITY_RESULT" \
            "$QUALITY_RESULT" \
            "$FEATURE_RESULT" \
            "$COVERAGE_RESULT"
          do
            if [[ "$result" != "success" ]]; then
              state="failure"
              description="Athanor verification matrix failed"
              break
            fi
          done
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > verification-status.json
          import json
          import os

          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/verification-matrix",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @verification-status.json
