name: Test Remediation V13

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v13.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v13-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "3d89d12ecefaf2afec6ddabc93a3326aebb5a75c:"
                  ".github/workflows/test-remediation-v12.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])

          direct_start = script.index(
              'direct = "crates/athanor-app/src/repair_composition/direct.rs"'
          )
          search_start = script.index(
              'search = "crates/athanor-app/src/search_operation.rs"', direct_start
          )
          direct_patch = '''direct = Path("crates/athanor-app/src/repair_composition/direct.rs")
          direct_text = direct.read_text()
          function_start = direct_text.index("    fn write_legacy_artifacts(")
          function_end = direct_text.index("\n    fn snapshot_base()", function_start)
          anchor = '        fs::create_dir_all(root.join(".athanor/state")).unwrap();\n'
          scoped = direct_text[function_start:function_end]
          if scoped.count(anchor) != 1:
              raise SystemExit(
                  "repair legacy fixture: expected one scoped state-directory anchor, "
                  f"found {scoped.count(anchor)}"
              )
          insertion = anchor + "\n".join(
              [
                  "        for file in [",
                  '            "entities.jsonl",',
                  '            "facts.jsonl",',
                  '            "relations.jsonl",',
                  '            "diagnostics.jsonl",',
                  "        ] {",
                  '            fs::write(read_model.join(file), "").unwrap();',
                  "        }",
              ]
          ) + "\n"
          scoped = scoped.replace(anchor, insertion, 1)
          direct.write_text(
              direct_text[:function_start] + scoped + direct_text[function_end:]
          )

          '''
          script = script[:direct_start] + direct_patch + script[search_start:]
          script = script.replace(
              '              ".github/workflows/test-remediation-v12.yml",\n',
              '              ".github/workflows/test-remediation-v12.yml",\n'
              '              ".github/workflows/test-remediation-v13.yml",\n',
              1,
          )
          exec(
              compile(script, "test-remediation-v13", "exec"),
              {"__builtins__": __builtins__},
          )
          PY
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v13.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "test(app): align deterministic publication and cancellation fixtures"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v13-diagnostics
          path: ${{ runner.temp }}/test-remediation-v13.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V13 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V13 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v13",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
