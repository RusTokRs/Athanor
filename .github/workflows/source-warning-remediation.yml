name: Source Warning Remediation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/source-warning-remediation.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: source-warning-remediation-main
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Remove exact dead and duplicate owners
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}")
              file.write_text(text.replace(old, new, 1))

          daemon = "crates/athanor-app/src/daemon_queries.rs"
          for block in [
              '''pub(crate) async fn latest_snapshot(state: &Arc<DaemonState>) -> Result<CanonicalSnapshot> {
              latest_snapshot_with_operation_context(state, &OperationContext::default()).await
          }

          ''',
              '''pub(crate) async fn context(
              state: &Arc<DaemonState>,
              task: &str,
              level: ContextLevel,
              overrides: &ContextLimitOverrides,
          ) -> Result<ContextReport> {
              context_with_operation_context(state, task, level, overrides, &OperationContext::default())
                  .await
          }

          ''',
              '''pub(crate) async fn overview(state: &Arc<DaemonState>, top: usize) -> Result<RepositoryOverview> {
              overview_with_operation_context(state, top, &OperationContext::default()).await
          }

          ''',
              '''pub(crate) async fn explain(
              state: &Arc<DaemonState>,
              stable_key: &str,
          ) -> Result<crate::explain::EntityExplanation> {
              explain_with_operation_context(state, stable_key, &OperationContext::default()).await
          }

          ''',
              '''pub(crate) async fn search(
              state: &Arc<DaemonState>,
              query: String,
              limit: usize,
          ) -> Result<crate::search::SearchReport> {
              let operation = OperationContext::default();
              let snapshot = latest_snapshot(state).await?;
              let index = search_index(state, &snapshot)?;
              search_snapshot_with_index_and_operation_context(
                  &state.endpoint.root,
                  &snapshot,
                  query,
                  limit,
                  index.as_ref(),
                  &operation,
              )
              .await
          }

          ''',
              '''fn search_index(state: &DaemonState, snapshot: &CanonicalSnapshot) -> Result<Arc<dyn SearchIndex>> {
              search_index_with_operation_context(state, snapshot, &OperationContext::default())
          }

          ''',
          ]:
              replace_once(daemon, block, "")

          replace_once(
              "crates/athanor-app/src/docs.rs",
              "mod frontmatter;",
              "pub(crate) mod frontmatter;",
          )
          frontmatter = "crates/athanor-app/src/docs/frontmatter.rs"
          for name in [
              "allocate_docs_patch_path",
              "resolve_project_output",
              "resolve_docs_patch_path",
              "safe_project_path",
              "apply_frontmatter_changes",
          ]:
              replace_once(frontmatter, f"pub(super) fn {name}", f"pub(crate) fn {name}")

          propose = "crates/athanor-app/src/application_report_composition/docs_direct/propose.rs"
          replace_once(propose, "use std::path::{Component, Path, PathBuf};\n\n", "")
          replace_once(
              propose,
              "use crate::composition::RuntimeComposition;\n",
              "use crate::composition::RuntimeComposition;\nuse crate::docs::frontmatter::{allocate_docs_patch_path, resolve_project_output};\n",
          )
          replace_once(
              propose,
              "        None => allocate_docs_patch_path(&root, &proposal.id),",
              "        None => allocate_docs_patch_path(&root, &proposal.id)?,",
          )
          replace_once(
              propose,
              '''
          fn allocate_docs_patch_path(root: &Path, id: &str) -> PathBuf {
              let dir = root.join(".athanor/patches/docs");
              for index in 0.. {
                  let suffix = if index == 0 {
                      String::new()
                  } else {
                      format!("_{index}")
                  };
                  let path = dir.join(format!("{id}{suffix}.json"));
                  if !path.exists() {
                      return path;
                  }
              }
              unreachable!("unbounded docs patch path allocation should always return")
          }

          fn resolve_project_output(root: &Path, output: &Path) -> Result<PathBuf> {
              if output.is_absolute() {
                  return Ok(output.to_path_buf());
              }
              safe_project_path(root, output.to_string_lossy().as_ref())
          }

          fn safe_project_path(root: &Path, relative: &str) -> Result<PathBuf> {
              let path = Path::new(relative);
              if path.is_absolute() {
                  anyhow::bail!("project-relative path expected, got `{relative}`");
              }
              for component in path.components() {
                  match component {
                      Component::Normal(_) | Component::CurDir => {}
                      Component::ParentDir | Component::RootDir | Component::Prefix(_) => {
                          anyhow::bail!("unsafe project path `{relative}`")
                      }
                  }
              }
              Ok(root.join(path))
          }
          ''',
              "\n",
          )

          apply = "crates/athanor-app/src/application_report_composition/docs_direct/apply.rs"
          replace_once(apply, "use std::collections::BTreeMap;\n", "")
          replace_once(apply, "use std::path::{Component, Path, PathBuf};\n", "")
          replace_once(apply, "use serde_json::Value;\n\n", "")
          replace_once(
              apply,
              "use crate::composition::RuntimeComposition;\n",
              "use crate::composition::RuntimeComposition;\nuse crate::docs::frontmatter::{\n    apply_frontmatter_changes, resolve_docs_patch_path, safe_project_path,\n};\n",
          )
          marker = "\nfn resolve_docs_patch_path(root: &Path, patch: &str) -> Result<PathBuf> {"
          text = Path(apply).read_text()
          if text.count(marker) != 1:
              raise SystemExit(f"{apply}: expected one local helper marker")
          Path(apply).write_text(text.split(marker, 1)[0] + "\n")

          base = "crates/athanor-app/src/json_contract_base.rs"
          replace_once(base, "macro_rules! descriptor {", "#[cfg(test)]\nmacro_rules! descriptor {")
          replace_once(
              base,
              "pub const VERSIONED_JSON_CONTRACTS: &[JsonContractDescriptor] = &[",
              "#[cfg(test)]\npub const VERSIONED_JSON_CONTRACTS: &[JsonContractDescriptor] = &[",
          )

          pointer = "crates/athanor-app/src/repair_pointer.rs"
          replace_once(pointer, "\nuse crate::RuntimeComposition;\n", "\n")
          replace_once(
              pointer,
              '''pub async fn apply_repair(
              options: RepairApplyOptions,
              composition: &RuntimeComposition,
          ) -> Result<RepairApplyReport> {
              let canonical = recover_canonical_repair(RepairRecoverCanonicalOptions {
                  root: options.root.clone(),
                  dry_run: options.dry_run,
              })?;
              let root = canonical.root.clone();
              let generated = regenerate_repair(
                  RepairRegenerateOptions {
                      root: root.clone(),
                      dry_run: options.dry_run,
                  },
                  composition,
              )
              .await?;
              let cleanup = cleanup_repair(RepairCleanupOptions {
                  root: root.clone(),
                  dry_run: options.dry_run,
                  keep_canonical: options.keep_canonical,
                  keep_generated: options.keep_generated,
                  generated_only: options.generated_only,
              })?;

              Ok(RepairApplyReport {
                  schema: "athanor.repair_apply.v2".to_string(),
                  root,
                  dry_run: options.dry_run,
                  canonical,
                  generated,
                  remaining_issues: cleanup.remaining_issues.clone(),
                  cleanup,
              })
          }

          ''',
              "",
          )

          legacy_repair = "crates/athanor-app/src/repair.rs"
          text = Path(legacy_repair).read_text()
          marker = "\npub async fn apply_repair("
          if text.count(marker) != 1:
              raise SystemExit(f"{legacy_repair}: expected one legacy apply marker")
          Path(legacy_repair).write_text(text.split(marker, 1)[0].rstrip() + "\n")

          architecture = "crates/athanor-app/src/rustok_architecture.rs"
          replace_once(architecture, "use anyhow::{Result, bail};\n", "")
          replace_once(
              architecture,
              '''fn validate_limits(options: &RustokArchitectureContextOptions) -> Result<()> {
              if options.max_modules == 0
                  || options.max_contracts == 0
                  || options.max_interactions == 0
                  || options.max_evidence == 0
              {
                  bail!("Rustok architecture context limits must be greater than zero");
              }
              Ok(())
          }

          ''',
              "",
          )

          plan = "athanor_implementation_plan_ru.md"
          replace_once(
              plan,
              "- `VERIFY-001E` — canonical formatting, compile-owner cleanup и patched advisory lockfile.\n",
              "- `VERIFY-001E` — canonical formatting, compile-owner cleanup и patched advisory lockfile;\n- `VERIFY-001F` — exact test compile и dead-owner cleanup.\n",
          )
          replace_once(
              plan,
              "- [x] Одноцелевой lock remediation workflow удалён после применения.\n\n## 4. Следующие активные пакеты",
              "- [x] Одноцелевой lock remediation workflow удалён после применения.\n\n### 3.11 `VERIFY-001F` — exact test compile and dead-owner cleanup\n\n- [x] Run `29739854537` на SHA `8c012b7624fd16a6cdf1a8aac27a63aee12853d7` подтвердил security и formatting success.\n- [x] Workspace tests/feature/coverage остановились на exact test compile error: `Output::success()` вместо `Output::status.success()`.\n- [x] Test helper исправлен без изменения process semantics.\n- [x] Подтверждённые Clippy blockers удалены: default daemon wrappers, duplicate Docs helpers, superseded base registry, legacy repair apply owners и unused Rustok validator.\n- [x] Docs direct services используют единый `docs/frontmatter.rs` utility owner.\n\n## 4. Следующие активные пакеты",
          )
          replace_once(
              plan,
              "- [ ] получить exact matrix result для текущего HEAD;\n- [ ] разобрать remaining tests/Clippy/coverage/smoke failures, если они останутся;",
              "- [x] exact run `29739854537` классифицирован; security и formatting прошли, test compile завершился failure;\n- [x] exact test compile error и подтверждённые dead-code blockers устранены;\n- [ ] получить exact matrix result для нового HEAD;\n- [ ] разобрать remaining runtime tests/coverage/smoke failures, если они останутся;",
          )
          replace_once(
              plan,
              "| `VERIFY-001E` | P1 | `[x] implemented` | Fmt, compile owners and advisory lockfile remediated |\n| `VERIFY-001`",
              "| `VERIFY-001E` | P1 | `[x] implemented` | Fmt, compile owners and advisory lockfile remediated |\n| `VERIFY-001F` | P1 | `[x] implemented` | Exact test compile and dead owners remediated |\n| `VERIFY-001`",
          )
          replace_once(
              plan,
              "- Status — implemented; final exact matrix pending.\n",
              "- Run `29739854537` подтвердил security/formatting и локализовал test compile failure.\n- Exact test error и confirmed dead-code owners устранены без suppressions.\n- Status — implemented; final exact matrix pending.\n",
          )

          Path(".github/workflows/source-warning-remediation.yml").unlink()
          PY
          cargo fmt --all
      - name: Validate remediated source
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo check --workspace --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Commit exact remediation
        shell: bash
        run: |
          set -euo pipefail
          expected="$RUNNER_TEMP/expected-paths"
          cat > "$expected" <<'EOF'
          .github/workflows/source-warning-remediation.yml
          athanor_implementation_plan_ru.md
          crates/athanor-app/src/application_report_composition/docs_direct/apply.rs
          crates/athanor-app/src/application_report_composition/docs_direct/propose.rs
          crates/athanor-app/src/daemon_queries.rs
          crates/athanor-app/src/docs.rs
          crates/athanor-app/src/docs/frontmatter.rs
          crates/athanor-app/src/json_contract_base.rs
          crates/athanor-app/src/repair.rs
          crates/athanor-app/src/repair_pointer.rs
          crates/athanor-app/src/rustok_architecture.rs
          EOF
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          diff -u "$expected" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): remove exact warning owners"
          git push origin HEAD:main
