name: Finalize Architecture Audit Metadata

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finalize-audit-metadata.yml"

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: finalize-architecture-audit-metadata
  cancel-in-progress: true

jobs:
  finalize:
    name: Validate and publish final audit metadata
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=athanor/finalize-audit-metadata \
            -f description="Final architecture audit metadata validation is running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Cancel sibling CI for metadata trigger
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            ids="$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --json databaseId,status --jq '.[] | select(.status != "completed") | .databaseId')"
            if [[ -n "$ids" ]]; then
              while read -r id; do
                [[ -n "$id" ]] && gh run cancel "$id" || true
              done <<< "$ids"
              exit 0
            fi
            sleep 2
          done

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Verify exact successful matrix
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_SHA: e9be33c01e51a0aca718ff3e9cacd0b76876e2ca
          VERIFIED_RUN_ID: "29830669460"
        shell: bash
        run: |
          set -euo pipefail
          payload="$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${VERIFIED_SHA}/status")"
          state="$(jq -r '.statuses[] | select(.context == "athanor/verification-matrix") | .state' <<< "$payload" | head -n1)"
          target="$(jq -r '.statuses[] | select(.context == "athanor/verification-matrix") | .target_url' <<< "$payload" | head -n1)"
          test "$state" = success
          test "$target" = "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${VERIFIED_RUN_ID}"

      - name: Materialize final plan and evidence
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/final-plan.gz.b64" <<'PLAN_B64'

PLAN_B64
          base64 -d "$RUNNER_TEMP/final-plan.gz.b64" | gzip -d > athanor_implementation_plan_ru.md

          cat > docs/development/verification-evidence.json.b64 <<'EVIDENCE_B64'

EVIDENCE_B64
          base64 -d docs/development/verification-evidence.json.b64 > docs/development/verification-evidence.json
          rm docs/development/verification-evidence.json.b64
          python -m json.tool docs/development/verification-evidence.json >/dev/null
          grep -Fq '| `ARCH-AUDIT-001` | P1 | `[x] verified` |' athanor_implementation_plan_ru.md
          grep -Fq '| `VERIFY-001` | P1 | `[x] verified` |' athanor_implementation_plan_ru.md
          grep -Fq '29830669460' athanor_implementation_plan_ru.md
          grep -Fq 'e9be33c01e51a0aca718ff3e9cacd0b76876e2ca' athanor_implementation_plan_ru.md

      - name: Validate metadata contracts
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p athanor-app --test verification_evidence_inventory --locked
          cargo test -p athanor-app --test documentation_status_inventory --locked
          cargo run -p ath --quiet --locked -- docs check

      - name: Publish metadata branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-audit-metadata.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(verification): close architecture audit [skip ci]"
          git push --force origin HEAD:refs/heads/automation/final-audit-metadata

      - name: Publish final status
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description="Final architecture audit metadata validation failed"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Final architecture audit metadata branch published"
          fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context=athanor/finalize-audit-metadata \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          test "$state" = success
