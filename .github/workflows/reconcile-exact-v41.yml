name: Reconcile Exact V41 Source

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/reconcile-exact-v41.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: reconcile-exact-v41-main
  cancel-in-progress: true

jobs:
  reconcile:
    name: Rebuild and validate exact V41 source
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=athanor/reconcile-exact-v41 \
            -f description="Exact V41 source reconciliation is running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Rebuild exact validated source
        id: rebuild
        shell: bash
        run: |
          set -euo pipefail
          validated="$RUNNER_TEMP/v41-validated-source"
          git worktree add --detach "$validated" c3f44d92ec2554a4d6e80e24f371aded18a0aea9
          pushd "$validated"
          for version in 28 30 31 33 35 37 39 40 41; do
            python ".github/scripts/matrix_remediation_v${version}.py"
          done
          cargo fmt --all
          popd

          paths=(
            crates/athanor-app/src/index_runtime.rs
            crates/athanor-app/src/index_runtime_tests.rs
            crates/athanor-app/src/runtime/process_runner.rs
            crates/athanor-app/src/runtime/tests/process.rs
            crates/athanor-app/tests/api_composition_inventory.rs
            crates/athanor-app/tests/check_composition_inventory.rs
            crates/athanor-app/tests/context_composition_inventory.rs
            crates/athanor-app/tests/graph_composition_inventory.rs
            crates/athanor-app/tests/json_contract_inventory.rs
            crates/athanor-app/tests/publication_semantics_inventory.rs
            crates/athanor-app/tests/read_service_composition_inventory.rs
            crates/athanor-app/tests/verification_evidence_inventory.rs
            crates/athanor-store-surrealdb/src/backend_store.rs
            crates/athanor-store-surrealdb/src/facade.rs
            crates/athanor-transport-mcp/tests/control_plane_saturation_inventory.rs
            crates/athanor-transport-mcp/tests/index_publication_cancellation_inventory.rs
            docs/development/legacy-runtime-compatibility.md
            docs/development/publication-semantics-inventory.md
          )
          for path in "${paths[@]}"; do
            test -f "$validated/$path"
            mkdir -p "$(dirname "$path")"
            cp "$validated/$path" "$path"
          done
          rm -f docs/operations/script-script-command-github-workflows-ci-yml-github-actions-job-quality-step-5-run.md
          cargo fmt --all
          cargo fmt --all -- --check
          git diff --check

          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          crates/athanor-app/src/index_runtime.rs
          crates/athanor-app/src/index_runtime_tests.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/runtime/tests/process.rs
          crates/athanor-app/tests/api_composition_inventory.rs
          crates/athanor-app/tests/check_composition_inventory.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/graph_composition_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          crates/athanor-app/tests/publication_semantics_inventory.rs
          crates/athanor-app/tests/read_service_composition_inventory.rs
          crates/athanor-app/tests/verification_evidence_inventory.rs
          crates/athanor-store-surrealdb/src/backend_store.rs
          crates/athanor-store-surrealdb/src/facade.rs
          crates/athanor-transport-mcp/tests/control_plane_saturation_inventory.rs
          crates/athanor-transport-mcp/tests/index_publication_cancellation_inventory.rs
          docs/development/legacy-runtime-compatibility.md
          docs/development/publication-semantics-inventory.md
          docs/operations/script-script-command-github-workflows-ci-yml-github-actions-job-quality-step-5-run.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          unexpected="$(comm -23 "$RUNNER_TEMP/actual-paths" "$RUNNER_TEMP/allowed-paths")"
          if [[ -n "$unexpected" ]]; then
            echo "unexpected reconciled paths:" >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Validate reconciled source
        shell: bash
        run: |
          set -euo pipefail
          cargo check --workspace --locked
          cargo check --workspace --all-features --locked
          cargo test --workspace --quiet --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo check --workspace --features store-surreal --locked
          for attempt in $(seq 1 12); do
            cargo test -p athanor-store-surrealdb \
              backend::tests::atomic_counter_survives_independent_writer_gates \
              --locked -- --exact --nocapture
          done
          cargo run -p ath --quiet --locked -- index .
          cargo run -p ath --quiet --locked -- docs check

      - name: Publish reconciled source branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/reconcile-exact-v41.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): publish exact V41 validated source"
          git push --force origin HEAD:refs/heads/automation/v41-exact-source

      - name: Publish final status
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REBUILD_OUTCOME: ${{ steps.rebuild.outcome }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description="Exact V41 source reconciliation failed"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Exact V41 source branch published"
          fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context=athanor/reconcile-exact-v41 \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          test "$state" = success
