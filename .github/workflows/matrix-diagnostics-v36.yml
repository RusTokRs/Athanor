name: Matrix Diagnostics V36

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-diagnostics-v36.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: matrix-diagnostics-v36-main
  cancel-in-progress: true

jobs:
  windows-workspace:
    name: Windows workspace diagnostic
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Apply deterministic remediation
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/matrix_remediation_v28.py
          python .github/scripts/matrix_remediation_v30.py
          python .github/scripts/matrix_remediation_v31.py
          python .github/scripts/matrix_remediation_v33.py
          python .github/scripts/matrix_remediation_v35.py
          cargo fmt --all
          cargo fmt --all -- --check
      - name: Run workspace tests and capture log
        id: workspace
        shell: bash
        run: |
          set +e
          cargo test --workspace --locked -- --nocapture 2>&1 | tee "$RUNNER_TEMP/windows-workspace-v36.log"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Extract compact failure summary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          source = Path(os.environ["RUNNER_TEMP"]) / "windows-workspace-v36.log"
          target = Path(os.environ["RUNNER_TEMP"]) / "windows-workspace-v36-summary.txt"
          if not source.exists():
              target.write_text("workspace log was not created\n")
              raise SystemExit(0)

          lines = source.read_text(errors="replace").splitlines()
          markers = (
              "FAILED",
              "failures:",
              "panicked at",
              "error:",
              "test result:",
              "could not compile",
          )
          selected: list[str] = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  start = max(0, index - 5)
                  end = min(len(lines), index + 12)
                  selected.extend(lines[start:end])
                  selected.append("---")
          if not selected:
              selected = lines[-300:]
          target.write_text("\n".join(selected[-1200:]) + "\n")
          PY
          cat "$RUNNER_TEMP/windows-workspace-v36-summary.txt"
      - name: Upload Windows workspace diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-workspace-v36
          path: |
            ${{ runner.temp }}/windows-workspace-v36.log
            ${{ runner.temp }}/windows-workspace-v36-summary.txt
          if-no-files-found: error
          retention-days: 14
      - name: Enforce workspace result
        if: ${{ always() }}
        shell: bash
        run: test "${{ steps.workspace.outputs.exit_code }}" = "0"

  status:
    name: Publish diagnostic status
    if: ${{ always() }}
    needs: [windows-workspace]
    runs-on: ubuntu-latest
    steps:
      - name: Publish exact status
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.windows-workspace.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [[ "$RESULT" == success ]]; then state=success; fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="athanor/matrix-diagnostics-v36" \
            -f description="Windows workspace diagnostic: $state" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
