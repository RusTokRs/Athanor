name: Test Remediation V18

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v18.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v18-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "0e9237df37555679ff1aa0a940c7a07c2443d9c5:"
                  ".github/workflows/test-remediation-v17.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "test-remediation-v18-base",
                  "exec",
              ),
              {"__builtins__": __builtins__},
          )

          lock_test = Path(
              "crates/athanor-store-surrealdb/tests/persistent_lock.rs"
          )
          text = lock_test.read_text()
          import_anchor = (
              "use std::path::{Path, PathBuf};\n"
              "use std::time::{SystemTime, UNIX_EPOCH};"
          )
          import_replacement = (
              "use std::path::{Path, PathBuf};\n"
              "use std::process::Command;\n"
              "use std::time::{SystemTime, UNIX_EPOCH};"
          )
          if text.count(import_anchor) != 1:
              raise SystemExit(
                  "persistent lock test: expected one import anchor, "
                  f"found {text.count(import_anchor)}"
              )
          text = text.replace(import_anchor, import_replacement, 1)

          same_process_probe = '''    let error = SurrealKnowledgeStore::connect(&uri)
              .await
              .expect_err("second persistent connection must fail while the directory is locked");

              assert_eq!(error.code(), CoreErrorCode::Busy);
              assert!(error.is_retryable());
              assert!(matches!(&error, CoreError::Busy(_)));
              assert!(
                  error
                      .to_string()
                      .to_ascii_lowercase()
                      .contains("already locked by another process"),
                  "unexpected lock-contention error: {error}"
              );'''
          child_probe = '''    let output = Command::new(
                  std::env::current_exe().expect("locate persistent lock test binary"),
              )
              .arg("--exact")
              .arg("persistent_surrealkv_child_connection_reports_retryable_busy")
              .arg("--ignored")
              .arg("--nocapture")
              .env("ATHANOR_SURREALKV_LOCK_CHILD_URI", &uri)
              .output()
              .expect("spawn independent persistent SurrealKV lock probe");
              assert!(
                  output.status.success(),
                  "independent lock probe failed\\nstdout:\\n{}\\nstderr:\\n{}",
                  String::from_utf8_lossy(&output.stdout),
                  String::from_utf8_lossy(&output.stderr)
              );'''
          if text.count(same_process_probe) != 1:
              raise SystemExit(
                  "persistent lock test: expected one same-process probe, "
                  f"found {text.count(same_process_probe)}"
              )
          text = text.replace(same_process_probe, child_probe, 1)

          helper_anchor = "fn unique_store_path() -> PathBuf {"
          child_test = '''#[tokio::test]
          #[ignore = "spawned as an independent process by the persistent lock regression"]
          async fn persistent_surrealkv_child_connection_reports_retryable_busy() {
              let uri = std::env::var("ATHANOR_SURREALKV_LOCK_CHILD_URI")
                  .expect("child persistent lock probe URI");
              let error = SurrealKnowledgeStore::connect(&uri)
                  .await
                  .expect_err("independent persistent connection must fail while locked");

              assert_eq!(error.code(), CoreErrorCode::Busy);
              assert!(error.is_retryable());
              assert!(matches!(&error, CoreError::Busy(_)));
              assert!(
                  error
                      .to_string()
                      .to_ascii_lowercase()
                      .contains("already locked by another process"),
                  "unexpected lock-contention error: {error}"
              );
          }

          fn unique_store_path() -> PathBuf {'''
          if text.count(helper_anchor) != 1:
              raise SystemExit(
                  "persistent lock test: expected one helper anchor, "
                  f"found {text.count(helper_anchor)}"
              )
          lock_test.write_text(text.replace(helper_anchor, child_test, 1))

          Path(".github/workflows/test-remediation-v18.yml").unlink()
          PY
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v18.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          .github/workflows/test-remediation-v14.yml
          .github/workflows/test-remediation-v15.yml
          .github/workflows/test-remediation-v16.yml
          .github/workflows/test-remediation-v17.yml
          .github/workflows/test-remediation-v18.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          crates/athanor-app/tests/legacy_factory_migration.rs
          crates/athanor-app/tests/mcp_runtime_bootstrap_inventory.rs
          crates/athanor-app/tests/runtime_modularity_inventory.rs
          crates/athanor-app/tests/service_composition_inventory.rs
          crates/athanor-core/src/read_operation.rs
          crates/athanor-store-surrealdb/tests/persistent_lock.rs
          docs/development/json-contract-inventory.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "test(store): verify persistent lock across process boundary"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v18-diagnostics
          path: ${{ runner.temp }}/test-remediation-v18.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V18 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V18 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v18",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
