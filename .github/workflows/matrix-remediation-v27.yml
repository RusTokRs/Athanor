  publish:
    name: Publish validated remediation
    if: ${{ always() }}
    needs: [quality, store-surreal]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        if: ${{ needs.quality.result == 'success' && needs.store-surreal.result == 'success' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Apply, document, and publish remediation
        id: commit
        if: ${{ needs.quality.result == 'success' && needs.store-surreal.result == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one target, found {count}: {old!r}")
              file_path.write_text(text.replace(old, new, 1))

          replace_once("crates/athanor-app/tests/api_composition_inventory.rs", '    assert!(API_ROOT.contains("#[cfg(test)]\\nmod tests;"));', '    let normalized_root = API_ROOT.replace("\\r\\n", "\\n");\n    assert!(normalized_root.contains("#[cfg(test)]\\nmod tests;"));')
          process_tests = "crates/athanor-app/src/runtime/tests/process.rs"
          replace_once(process_tests, 'use std::fs;\nuse std::path::{Path, PathBuf};', '#[cfg(unix)]\nuse std::fs;\nuse std::path::Path;\n#[cfg(unix)]\nuse std::path::PathBuf;')
          replace_once(process_tests, '#[cfg(unix)]\nuse super::fixtures::sh_path;\nuse super::fixtures::{failing_command, sleep_command, stdout_bytes_command, test_working_dir};', '#[cfg(unix)]\nuse super::fixtures::{sh_path, test_working_dir};\nuse super::fixtures::{failing_command, sleep_command, stdout_bytes_command};')
          replace_once(process_tests, 'fn temp_root(label: &str) -> PathBuf {', '#[cfg(unix)]\nfn temp_root(label: &str) -> PathBuf {')

          runtime = Path("crates/athanor-app/src/index_runtime.rs")
          text = runtime.read_text()
          start = text.index('    let previous_state = state_store.load().context("failed to load index state")?;')
          end = text.index("\n\n    let output_result =", start)
          block = '''    let previous_state = state_store.load().context("failed to load index state")?;
              let previous_snapshot = match previous_state.snapshot.as_ref() {
                  Some(snapshot) => canonical_store.load_snapshot(&SnapshotId(snapshot.clone())).await
                      .context("failed to load previous canonical snapshot")?,
                  None => None,
              };
              let has_previous_canonical_snapshot = previous_snapshot.is_some();
              let incremental = if previous_state.snapshot.is_some() && !has_previous_canonical_snapshot {
                  IncrementalIndexContext::default()
              } else {
                  IncrementalIndexContext { previous_state: previous_state.clone(), previous_snapshot }
              };'''
          text = text[:start] + block + text[end:]
          context = '''                    IncrementalIndexContext {
                          previous_state: previous_state.clone(),
                          previous_snapshot,
                      },'''
          if text.count(context) != 4:
              raise SystemExit(f"index runtime: expected four contexts, found {text.count(context)}")
          text = text.replace(context, "                    incremental.clone(),")
          old = '''    if previous_state.snapshot.as_deref() == Some(output.snapshot.0.as_str())
                  && output.affected_files.changed.is_empty()'''
          new = '''    if has_previous_canonical_snapshot
                  && previous_state.snapshot.as_deref() == Some(output.snapshot.0.as_str())
                  && output.affected_files.changed.is_empty()'''
          if text.count(old) != 1:
              raise SystemExit(f"index runtime: expected one no-op branch, found {text.count(old)}")
          runtime.write_text(text.replace(old, new, 1))

          tests = Path("crates/athanor-app/src/index_runtime_tests.rs")
          text = tests.read_text()
          anchor = '''#[tokio::test]
          async fn cancelled_index_does_not_publish_snapshot_state_or_read_model() {'''
          regression = '''#[tokio::test]
          async fn missing_canonical_snapshot_invalidates_stale_incremental_state() {
              let root = test_root("missing-canonical");
              fs::create_dir_all(root.join("src")).expect("create source directory");
              fs::write(root.join("src/lib.rs"), "pub fn recovered() {}\\n").expect("write source file");
              let composition = crate::test_runtime::composition();
              let first = run_index(&root, &composition).await;
              let canonical_root = root.join(".athanor/store/canonical/jsonl");
              fs::remove_dir_all(&canonical_root).expect("remove canonical store only");
              assert!(root.join(".athanor/state/index-state.json").is_file());
              let rebuilt = run_index(&root, &composition).await;
              assert_eq!(rebuilt.changed_files, 1);
              let latest = JsonlKnowledgeStore::new(&canonical_root).load_latest_snapshot().await
                  .expect("load rebuilt canonical snapshot").expect("rebuilt canonical snapshot exists");
              assert_eq!(latest.snapshot.as_ref().map(|snapshot| snapshot.0.as_str()), Some(rebuilt.snapshot.as_str()));
              let docs = crate::check_docs_with_composition(crate::DocsCheckOptions { root: root.clone() }, &composition)
                  .await.expect("docs check loads rebuilt canonical snapshot");
              assert_eq!(docs.snapshot, rebuilt.snapshot);
              assert!(docs.passed);
              assert_eq!(first.files_indexed, rebuilt.files_indexed);
              fs::remove_dir_all(root).expect("remove missing-canonical fixture");
          }

          #[tokio::test]
          async fn cancelled_index_does_not_publish_snapshot_state_or_read_model() {'''
          if text.count(anchor) != 1:
              raise SystemExit(f"index tests: expected one anchor, found {text.count(anchor)}")
          tests.write_text(text.replace(anchor, regression, 1))

          backend = Path("crates/athanor-store-surrealdb/src/backend_store.rs")
          text = backend.read_text()
          start = text.index("    async fn begin_snapshot(&self, repo: RepoId, base: SnapshotBase) -> CoreResult<SnapshotId> {")
          end = text.index("\n\n    async fn put_entities", start)
          begin = '''    async fn begin_snapshot(&self, repo: RepoId, base: SnapshotBase) -> CoreResult<SnapshotId> {
              let _guard = self.write_gate.lock().await;
              let repo = repo.0;
              let base_branch = base.branch;
              let base_commit = base.commit;
              let base_parent_snapshot = base.parent_snapshot.map(|snapshot| snapshot.0);
              let base_working_tree = base.working_tree;
              const MAX_ATTEMPTS: usize = 32;
              for attempt in 0..MAX_ATTEMPTS {
                  let sequence = self.allocate_snapshot_sequence().await?;
                  let snapshot_id = format!("snap_surreal_{sequence:08}");
                  let record = SnapshotRecord {
                      id: snapshot_id.clone(), repo: repo.clone(), base_branch: base_branch.clone(),
                      base_commit: base_commit.clone(), base_parent_snapshot: base_parent_snapshot.clone(),
                      base_working_tree, sequence, prepared: false, committed: false, generation: None,
                      allocation_operation_id: None, allocation_created_at_unix_ms: None,
                  };
                  let result: Result<Option<SnapshotRecord>, _> = self.db.create(("snapshot", &snapshot_id)).content(record).await;
                  match result {
                      Ok(_) => return Ok(SnapshotId(snapshot_id)),
                      Err(error) if attempt + 1 < MAX_ATTEMPTS
                          && (is_retryable_counter_conflict(&error.to_string()) || is_snapshot_record_collision(&error.to_string())) => {
                          sleep(Duration::from_millis(1_u64 << attempt.min(6))).await;
                      }
                      Err(error) => return Err(CoreError::Adapter(format!("failed to create snapshot record: {error}"))),
                  }
              }
              unreachable!("snapshot allocation retry loop always returns");
          }'''
          text = text[:start] + begin + text[end:]
          helper = '''fn is_retryable_counter_conflict(message: &str) -> bool {
              let message = message.to_ascii_lowercase();
              message.contains("read or write conflict") || message.contains("can be retried")
          }'''
          replacement = helper + '''

          fn is_snapshot_record_collision(message: &str) -> bool {
              let message = message.to_ascii_lowercase();
              message.contains("database record") && message.contains("already exists")
          }'''
          if text.count(helper) != 1:
              raise SystemExit(f"Surreal backend: expected one helper, found {text.count(helper)}")
          backend.write_text(text.replace(helper, replacement, 1))

          plan = Path("athanor_implementation_plan_ru.md")
          text = plan.read_text()
          anchor = "- [ ] Полная `athanor/verification-matrix` должна стать successful на опубликованном architecture commit до повышения пакетов до `[x] verified`.\n\n## 4. Следующие активные пакеты"
          run_id = os.environ["GITHUB_RUN_ID"]
          section = f'''- [ ] Полная `athanor/verification-matrix` должна стать successful на опубликованном architecture commit до повышения пакетов до `[x] verified`.

          ### 3.12 `VERIFY-001G` — full workspace и cross-platform remediation

          - [x] Run `29770365670` (V21) подтвердил полный workspace suite, `--all-features` check и оба Clippy; source commit `2b38618e4b53e3c5cbd3fc2d7c2eb2cc2cd16c43` опубликован.
          - [x] Run `29772014063` (V22) локализовал path aliases и executable mode; run `29775664727` (V24) подтвердил fixes на Linux, macOS и Windows, source commit `c7d3fb541304d3c9c308192aff0c2d6736114a1f` опубликован.
          - [x] Run `29777905429` (V26) локализовал CRLF-sensitive inventory, stale incremental state без canonical snapshot и Surreal snapshot-id collision.
          - [x] Run `{run_id}` (V27) подтвердил quality chain на трёх ОС и exact `store-surreal` feature slice перед публикацией этого source commit.
          - [x] Временные V25–V27 workflows физически удалены validated commit.
          - [ ] Финальная стандартная `athanor/verification-matrix` должна подтвердить exact source/plan HEAD.

          ## 4. Следующие активные пакеты'''
          if text.count(anchor) != 1:
              raise SystemExit(f"plan: expected one section anchor, found {text.count(anchor)}")
          text = text.replace(anchor, section, 1)
          stale = "- [ ] разобрать remaining tests/Clippy/coverage/smoke failures, если они останутся;"
          done = "- [x] known tests/Clippy/coverage/installer/feature failures разобраны и исправлены по exact diagnostics;"
          if text.count(stale) != 1:
              raise SystemExit(f"plan: expected one active failure item, found {text.count(stale)}")
          text = text.replace(stale, done, 1)
          table = "| `VERIFY-001F` | P1 | `[x] implemented` | Structural MCP and execution blockers closed by validated V10 |\n| `VERIFY-001` | P1 | `[!] blocked` | Exact successful status or JSON evidence identifies one commit |"
          table_new = "| `VERIFY-001F` | P1 | `[x] implemented` | Structural MCP and execution blockers closed by validated V10 |\n| `VERIFY-001G` | P1 | `[x] implemented` | Full workspace and cross-platform blockers closed by validated V21/V24/V27 |\n| `VERIFY-001` | P1 | `[!] blocked` | Exact successful status or JSON evidence identifies one commit |"
          if text.count(table) != 1:
              raise SystemExit(f"plan: expected one table anchor, found {text.count(table)}")
          plan.write_text(text.replace(table, table_new, 1))

          for workflow in [
              ".github/workflows/plan-evidence-v25.yml",
              ".github/workflows/matrix-diagnostics-v26.yml",
              ".github/workflows/matrix-remediation-v27.yml",
          ]:
              Path(workflow).unlink()
          PY
          cargo fmt --all
          git diff --check
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/matrix-diagnostics-v26.yml
          .github/workflows/matrix-remediation-v27.yml
          .github/workflows/plan-evidence-v25.yml
          athanor_implementation_plan_ru.md
          crates/athanor-app/src/index_runtime.rs
          crates/athanor-app/src/index_runtime_tests.rs
          crates/athanor-app/src/runtime/tests/process.rs
          crates/athanor-app/tests/api_composition_inventory.rs
          crates/athanor-store-surrealdb/src/backend_store.rs
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          comm -23 "$RUNNER_TEMP/actual-paths" "$RUNNER_TEMP/allowed-paths" > "$RUNNER_TEMP/unexpected-paths"
          test ! -s "$RUNNER_TEMP/unexpected-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): close remaining cross-platform matrix blockers"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches" \
            --data '{"ref":"main"}'
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          SURREAL_RESULT: ${{ needs.store-surreal.result }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Matrix remediation V27 failed"
          if [[ "$QUALITY_RESULT" == "success" && "$SURREAL_RESULT" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Matrix remediation V27 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/matrix-remediation-v27",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
