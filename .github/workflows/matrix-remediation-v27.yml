name: Matrix Remediation V27

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-remediation-v27.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: matrix-remediation-v27-main
  cancel-in-progress: true

jobs:
  quality:
    name: Quality remediation / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Apply matrix remediation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f"{path}: expected one replacement target, found {count}: {old!r}"
                  )
              file_path.write_text(text.replace(old, new, 1))

          inventory = "crates/athanor-app/tests/api_composition_inventory.rs"
          replace_once(
              inventory,
              '    assert!(API_ROOT.contains("#[cfg(test)]\\nmod tests;"));',
              '    let normalized_root = API_ROOT.replace("\\r\\n", "\\n");\n'
              '    assert!(normalized_root.contains("#[cfg(test)]\\nmod tests;"));',
          )

          process_tests = "crates/athanor-app/src/runtime/tests/process.rs"
          replace_once(
              process_tests,
              'use std::fs;\nuse std::path::{Path, PathBuf};',
              '#[cfg(unix)]\nuse std::fs;\nuse std::path::Path;\n#[cfg(unix)]\nuse std::path::PathBuf;',
          )
          replace_once(
              process_tests,
              '#[cfg(unix)]\nuse super::fixtures::sh_path;\nuse super::fixtures::{failing_command, sleep_command, stdout_bytes_command, test_working_dir};',
              '#[cfg(unix)]\nuse super::fixtures::{sh_path, test_working_dir};\nuse super::fixtures::{failing_command, sleep_command, stdout_bytes_command};',
          )
          replace_once(
              process_tests,
              'fn temp_root(label: &str) -> PathBuf {',
              '#[cfg(unix)]\nfn temp_root(label: &str) -> PathBuf {',
          )

          runtime = Path("crates/athanor-app/src/index_runtime.rs")
          text = runtime.read_text()
          baseline_start = text.index(
              '    let previous_state = state_store.load().context("failed to load index state")?;'
          )
          baseline_end = text.index("\n\n    let output_result =", baseline_start)
          baseline = '''    let previous_state = state_store.load().context("failed to load index state")?;
              let previous_snapshot = match previous_state.snapshot.as_ref() {
                  Some(snapshot) => canonical_store
                      .load_snapshot(&SnapshotId(snapshot.clone()))
                      .await
                      .context("failed to load previous canonical snapshot")?,
                  None => None,
              };
              let has_previous_canonical_snapshot = previous_snapshot.is_some();
              let incremental = if previous_state.snapshot.is_some()
                  && !has_previous_canonical_snapshot
              {
                  IncrementalIndexContext::default()
              } else {
                  IncrementalIndexContext {
                      previous_state: previous_state.clone(),
                      previous_snapshot,
                  }
              };'''
          text = text[:baseline_start] + baseline + text[baseline_end:]
          context_block = '''                    IncrementalIndexContext {
                          previous_state: previous_state.clone(),
                          previous_snapshot,
                      },'''
          context_count = text.count(context_block)
          if context_count != 4:
              raise SystemExit(
                  "index runtime: expected four incremental context blocks, "
                  f"found {context_count}"
              )
          text = text.replace(context_block, "                    incremental.clone(),")
          no_op_anchor = '''    if previous_state.snapshot.as_deref() == Some(output.snapshot.0.as_str())
                  && output.affected_files.changed.is_empty()'''
          no_op_replacement = '''    if has_previous_canonical_snapshot
                  && previous_state.snapshot.as_deref() == Some(output.snapshot.0.as_str())
                  && output.affected_files.changed.is_empty()'''
          if text.count(no_op_anchor) != 1:
              raise SystemExit(
                  "index runtime: expected one no-op branch anchor, "
                  f"found {text.count(no_op_anchor)}"
              )
          runtime.write_text(text.replace(no_op_anchor, no_op_replacement, 1))

          runtime_tests = Path("crates/athanor-app/src/index_runtime_tests.rs")
          text = runtime_tests.read_text()
          test_anchor = '''#[tokio::test]
          async fn cancelled_index_does_not_publish_snapshot_state_or_read_model() {'''
          regression = '''#[tokio::test]
          async fn missing_canonical_snapshot_invalidates_stale_incremental_state() {
              let root = test_root("missing-canonical");
              fs::create_dir_all(root.join("src")).expect("create source directory");
              fs::write(root.join("src/lib.rs"), "pub fn recovered() {}\\n")
                  .expect("write source file");
              let composition = crate::test_runtime::composition();

              let first = run_index(&root, &composition).await;
              let canonical_root = root.join(".athanor/store/canonical/jsonl");
              fs::remove_dir_all(&canonical_root).expect("remove canonical store only");
              assert!(root.join(".athanor/state/index-state.json").is_file());

              let rebuilt = run_index(&root, &composition).await;
              assert_eq!(rebuilt.changed_files, 1);
              let latest = JsonlKnowledgeStore::new(&canonical_root)
                  .load_latest_snapshot()
                  .await
                  .expect("load rebuilt canonical snapshot")
                  .expect("rebuilt canonical snapshot exists");
              assert_eq!(
                  latest.snapshot.as_ref().map(|snapshot| snapshot.0.as_str()),
                  Some(rebuilt.snapshot.as_str())
              );
              let docs = crate::check_docs_with_composition(
                  crate::DocsCheckOptions { root: root.clone() },
                  &composition,
              )
              .await
              .expect("docs check loads rebuilt canonical snapshot");
              assert_eq!(docs.snapshot, rebuilt.snapshot);
              assert!(docs.passed);
              assert_eq!(first.files_indexed, rebuilt.files_indexed);

              fs::remove_dir_all(root).expect("remove missing-canonical fixture");
          }

          #[tokio::test]
          async fn cancelled_index_does_not_publish_snapshot_state_or_read_model() {'''
          if text.count(test_anchor) != 1:
              raise SystemExit(
                  "index runtime tests: expected one cancellation test anchor, "
                  f"found {text.count(test_anchor)}"
              )
          runtime_tests.write_text(text.replace(test_anchor, regression, 1))

          backend = Path("crates/athanor-store-surrealdb/src/backend_store.rs")
          text = backend.read_text()
          begin_start = text.index(
              "    async fn begin_snapshot(&self, repo: RepoId, base: SnapshotBase) -> CoreResult<SnapshotId> {"
          )
          begin_end = text.index("\n\n    async fn put_entities", begin_start)
          begin = '''    async fn begin_snapshot(&self, repo: RepoId, base: SnapshotBase) -> CoreResult<SnapshotId> {
              let _guard = self.write_gate.lock().await;
              let repo = repo.0;
              let base_branch = base.branch;
              let base_commit = base.commit;
              let base_parent_snapshot = base.parent_snapshot.map(|snapshot| snapshot.0);
              let base_working_tree = base.working_tree;

              const MAX_ATTEMPTS: usize = 32;
              for attempt in 0..MAX_ATTEMPTS {
                  let sequence = self.allocate_snapshot_sequence().await?;
                  let snapshot_id = format!("snap_surreal_{sequence:08}");
                  let record = SnapshotRecord {
                      id: snapshot_id.clone(),
                      repo: repo.clone(),
                      base_branch: base_branch.clone(),
                      base_commit: base_commit.clone(),
                      base_parent_snapshot: base_parent_snapshot.clone(),
                      base_working_tree,
                      sequence,
                      prepared: false,
                      committed: false,
                      generation: None,
                      allocation_operation_id: None,
                      allocation_created_at_unix_ms: None,
                  };

                  let result: Result<Option<SnapshotRecord>, _> = self
                      .db
                      .create(("snapshot", &snapshot_id))
                      .content(record)
                      .await;
                  match result {
                      Ok(_) => return Ok(SnapshotId(snapshot_id)),
                      Err(error)
                          if attempt + 1 < MAX_ATTEMPTS
                              && (is_retryable_counter_conflict(&error.to_string())
                                  || is_snapshot_record_collision(&error.to_string())) =>
                      {
                          sleep(Duration::from_millis(1_u64 << attempt.min(6))).await;
                      }
                      Err(error) => {
                          return Err(CoreError::Adapter(format!(
                              "failed to create snapshot record: {error}"
                          )));
                      }
                  }
              }
              unreachable!("snapshot allocation retry loop always returns");
          }'''
          text = text[:begin_start] + begin + text[begin_end:]
          helper_anchor = '''fn is_retryable_counter_conflict(message: &str) -> bool {
              let message = message.to_ascii_lowercase();
              message.contains("read or write conflict") || message.contains("can be retried")
          }'''
          helper_replacement = helper_anchor + '''

          fn is_snapshot_record_collision(message: &str) -> bool {
              let message = message.to_ascii_lowercase();
              message.contains("database record") && message.contains("already exists")
          }'''
          if text.count(helper_anchor) != 1:
              raise SystemExit(
                  "Surreal backend: expected one conflict helper, "
                  f"found {text.count(helper_anchor)}"
              )
          backend.write_text(text.replace(helper_anchor, helper_replacement, 1))
          PY
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --quiet --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo run -p ath --quiet --locked -- index .
          cargo run -p ath --quiet --locked -- docs check
      - name: Test Linux installer checksum verification
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test_dir="$(mktemp -d)"
          trap 'rm -rf "$test_dir"' EXIT
          cp install.sh "$test_dir/"
          printf 'ath-test\n' > "$test_dir/ath"
          printf 'athd-test\n' > "$test_dir/athd"
          (cd "$test_dir" && sha256sum ath athd > SHA256SUMS)
          ATHANOR_INSTALL_DIR="$test_dir/install" "$test_dir/install.sh"
          cmp "$test_dir/ath" "$test_dir/install/ath"
          cmp "$test_dir/athd" "$test_dir/install/athd"
          printf 'tampered\n' >> "$test_dir/ath"
          if ATHANOR_INSTALL_DIR="$test_dir/rejected" "$test_dir/install.sh"; then
            echo "tampered Linux binary was accepted" >&2
            exit 1
          fi
      - name: Test Windows installer checksum verification
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testDir = Join-Path $env:RUNNER_TEMP "athanor-installer-test"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $testDir
          New-Item -ItemType Directory -Force $testDir | Out-Null
          Copy-Item install.ps1 $testDir
          Set-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "ath-test" -Encoding ascii
          Set-Content -LiteralPath (Join-Path $testDir "athd.exe") -Value "athd-test" -Encoding ascii
          $manifest = foreach ($file in @("ath.exe", "athd.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $manifest | Set-Content -LiteralPath (Join-Path $testDir "SHA256SUMS") -Encoding ascii
          & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "install")
          foreach ($file in @("ath.exe", "athd.exe")) {
            $sourceHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash
            $installedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path (Join-Path $testDir "install") $file)).Hash
            if ($sourceHash -ne $installedHash) { throw "installed file differs: $file" }
          }
          Add-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "tampered" -Encoding ascii
          $rejected = $false
          try {
            & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "rejected")
          } catch {
            $rejected = $true
          }
          if (-not $rejected) { throw "tampered Windows binary was accepted" }

  store-surreal:
