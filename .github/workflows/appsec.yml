name: AppSec

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review-diagnostic:
    name: Dependency review diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run dependency review without masking output
        id: review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          retry-on-snapshot-warnings: true
      - name: Materialize diagnostic report
        if: ${{ always() }}
        env:
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
          REVIEW_OUTPUTS: ${{ toJSON(steps.review.outputs) }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dependency-review-diagnostic"
          printf '%s\n' "$REVIEW_OUTCOME" > "$RUNNER_TEMP/dependency-review-diagnostic/outcome.txt"
          printf '%s\n' "$REVIEW_OUTPUTS" > "$RUNNER_TEMP/dependency-review-diagnostic/outputs.json"
          if [[ -f "$GITHUB_STEP_SUMMARY" ]]; then
            cp "$GITHUB_STEP_SUMMARY" "$RUNNER_TEMP/dependency-review-diagnostic/step-summary.md"
          else
            : > "$RUNNER_TEMP/dependency-review-diagnostic/step-summary.md"
          fi
      - name: Upload dependency review diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-001-dependency-review-diagnostic
          path: ${{ runner.temp }}/dependency-review-diagnostic
          if-no-files-found: error
          retention-days: 14
