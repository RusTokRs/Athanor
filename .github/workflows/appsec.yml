name: AppSec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appsec-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect dependency manifest changes
        id: dependency-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          pattern='(^|/)(Cargo\.toml|Cargo\.lock|package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|requirements[^/]*\.txt|poetry\.lock|Pipfile|Pipfile\.lock|go\.mod|go\.sum|pom\.xml|build\.gradle|build\.gradle\.kts|Gemfile|Gemfile\.lock|composer\.json|composer\.lock)$'
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq "$pattern"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency manifest or lockfile changes; dependency review API is not required." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Detect dependency graph support
        id: dependency-graph
        if: steps.dependency-files.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          response="$RUNNER_TEMP/dependency-graph.json"
          status="$(curl --silent --show-error --location \
            --output "$response" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/dependency-graph/sbom")"
          if [[ "$status" == "200" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          message="$(jq -r '.message // ""' "$response")"
          if [[ "$status" == "403" || "$status" == "404" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency review skipped because the repository SBOM endpoint returned HTTP $status: $message"
            echo "Dependency review skipped because GitHub Dependency Graph is unavailable to a contents:read workflow token. Rust advisories remain enforced by cargo-deny in CI." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Dependency graph preflight failed with HTTP $status: $message" >&2
          cat "$response" >&2
          exit 1
      - name: Reject newly introduced vulnerable dependencies
        if: steps.dependency-files.outputs.changed == 'true' && steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          retry-on-snapshot-warnings: true

  codeql:
    name: CodeQL / Rust
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: rust
          queries: security-extended
      - name: Install Rust 1.95
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
      - name: Build instrumented workspace
        run: cargo build --workspace --all-features --locked
      - name: Analyze Rust code
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:rust

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan repository with Gitleaks
        uses: step-security/gitleaks-action@678c692fa015502757d021ac74f2a42604bf2048 # v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workflow-audit:
    name: Workflow security audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Zizmor
        run: cargo install zizmor --version 1.26.1 --locked
      - name: Audit workflows
        run: zizmor --offline --strict-collection --min-severity high --min-confidence high --format github .

  exact-status:
    name: Exact AppSec status
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [dependency-review, codeql, secrets, workflow-audit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    env:
      DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
      CODEQL_RESULT: ${{ needs.codeql.result }}
      SECRETS_RESULT: ${{ needs.secrets.result }}
      WORKFLOW_AUDIT_RESULT: ${{ needs.workflow-audit.result }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish exact AppSec status
        shell: bash
        run: |
          set -euo pipefail
          state="success"
          description="Athanor AppSec checks passed"
          if [[ "$DEPENDENCY_RESULT" != "success" && "$DEPENDENCY_RESULT" != "skipped" ]] \
            || [[ "$CODEQL_RESULT" != "success" ]] \
            || [[ "$SECRETS_RESULT" != "success" ]] \
            || [[ "$WORKFLOW_AUDIT_RESULT" != "success" ]]; then
            state="failure"
            description="Athanor AppSec checks failed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > appsec-status.json
          import json
          import os

          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/appsec",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @appsec-status.json
