name: Test Remediation V20

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v20.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v20-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "7fda58dc21a9021d3ce1ab9e7847a2c54956fe56:"
                  ".github/workflows/test-remediation-v19.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "test-remediation-v20-base",
                  "exec",
              ),
              {"__builtins__": __builtins__},
          )

          manifest = Path("crates/athanor-store-surrealdb/Cargo.toml")
          manifest_text = manifest.read_text()
          dependency_anchor = (
              'athanor-domain = { path = "../athanor-domain" }\n'
              'serde = { workspace = true, features = ["derive"] }'
          )
          dependency_replacement = (
              'athanor-domain = { path = "../athanor-domain" }\n'
              'fs2.workspace = true\n'
              'serde = { workspace = true, features = ["derive"] }'
          )
          if manifest_text.count(dependency_anchor) != 1:
              raise SystemExit(
                  "Surreal manifest: expected one dependency anchor, "
                  f"found {manifest_text.count(dependency_anchor)}"
              )
          manifest.write_text(
              manifest_text.replace(dependency_anchor, dependency_replacement, 1)
          )

          facade = Path("crates/athanor-store-surrealdb/src/facade.rs")
          text = facade.read_text()
          import_anchor = (
              "use std::future::Future;\n"
              "use std::time::Duration;\n\n"
              "use async_trait::async_trait;"
          )
          import_replacement = (
              "use std::fs::{self, File, OpenOptions};\n"
              "use std::future::Future;\n"
              "use std::path::PathBuf;\n"
              "use std::sync::Arc;\n"
              "use std::time::Duration;\n\n"
              "use async_trait::async_trait;\n"
              "use fs2::FileExt;"
          )
          if text.count(import_anchor) != 1:
              raise SystemExit(
                  "Surreal facade: expected one import anchor, "
                  f"found {text.count(import_anchor)}"
              )
          text = text.replace(import_anchor, import_replacement, 1)

          boundary_anchor = (
              "#[derive(Debug, Clone)]\n"
              "pub struct SurrealKnowledgeStore {\n"
              "    inner: backend::SurrealKnowledgeStore,\n"
              "}\n\n"
              "impl SurrealKnowledgeStore {\n"
              "    pub async fn connect(uri: &str) -> CoreResult<Self> {\n"
              "        classify_backend_result(backend::SurrealKnowledgeStore::connect(uri).await)\n"
              "            .map(|inner| Self { inner })\n"
              "    }\n"
              "}\n"
          )
          boundary_replacement = (
              "#[derive(Debug, Clone)]\n"
              "pub struct SurrealKnowledgeStore {\n"
              "    inner: backend::SurrealKnowledgeStore,\n"
              "    _persistent_lease: Option<Arc<File>>,\n"
              "}\n\n"
              "impl SurrealKnowledgeStore {\n"
              "    pub async fn connect(uri: &str) -> CoreResult<Self> {\n"
              "        let persistent_lease = acquire_persistent_lease(uri)?;\n"
              "        classify_backend_result(backend::SurrealKnowledgeStore::connect(uri).await)\n"
              "            .map(|inner| Self {\n"
              "                inner,\n"
              "                _persistent_lease: persistent_lease,\n"
              "            })\n"
              "    }\n"
              "}\n\n"
              "fn acquire_persistent_lease(uri: &str) -> CoreResult<Option<Arc<File>>> {\n"
              "    let Some(raw_path) = uri.strip_prefix(\"surrealkv://\") else {\n"
              "        return Ok(None);\n"
              "    };\n"
              "    if raw_path.trim().is_empty() {\n"
              "        return Err(CoreError::InvalidInput(\n"
              "            \"persistent SurrealKV URI requires a filesystem path\".to_string(),\n"
              "        ));\n"
              "    }\n\n"
              "    let configured_path = PathBuf::from(raw_path);\n"
              "    let absolute_path = if configured_path.is_absolute() {\n"
              "        configured_path\n"
              "    } else {\n"
              "        std::env::current_dir()\n"
              "            .map_err(|error| {\n"
              "                CoreError::Adapter(format!(\n"
              "                    \"failed to resolve persistent SurrealKV path: {error}\"\n"
              "                ))\n"
              "            })?\n"
              "            .join(configured_path)\n"
              "    };\n"
              "    let file_name = absolute_path\n"
              "        .file_name()\n"
              "        .and_then(|name| name.to_str())\n"
              "        .filter(|name| !name.is_empty())\n"
              "        .ok_or_else(|| {\n"
              "            CoreError::InvalidInput(format!(\n"
              "                \"persistent SurrealKV path has no lockable directory name: {}\",\n"
              "                absolute_path.display()\n"
              "            ))\n"
              "        })?;\n"
              "    let parent = absolute_path.parent().ok_or_else(|| {\n"
              "        CoreError::InvalidInput(format!(\n"
              "            \"persistent SurrealKV path has no parent: {}\",\n"
              "            absolute_path.display()\n"
              "        ))\n"
              "    })?;\n"
              "    fs::create_dir_all(parent).map_err(|error| {\n"
              "        CoreError::Adapter(format!(\n"
              "            \"failed to create persistent SurrealKV parent {}: {error}\",\n"
              "            parent.display()\n"
              "        ))\n"
              "    })?;\n"
              "    let canonical_parent = fs::canonicalize(parent).map_err(|error| {\n"
              "        CoreError::Adapter(format!(\n"
              "            \"failed to canonicalize persistent SurrealKV parent {}: {error}\",\n"
              "            parent.display()\n"
              "        ))\n"
              "    })?;\n"
              "    let canonical_store = canonical_parent.join(file_name);\n"
              "    let lock_path = canonical_parent.join(format!(\".{file_name}.athanor.lock\"));\n"
              "    let file = OpenOptions::new()\n"
              "        .create(true)\n"
              "        .read(true)\n"
              "        .write(true)\n"
              "        .truncate(false)\n"
              "        .open(&lock_path)\n"
              "        .map_err(|error| {\n"
              "            CoreError::Adapter(format!(\n"
              "                \"failed to open persistent SurrealKV lease {}: {error}\",\n"
              "                lock_path.display()\n"
              "            ))\n"
              "        })?;\n"
              "    FileExt::try_lock_exclusive(&file).map_err(|error| {\n"
              "        if error.kind() == std::io::ErrorKind::WouldBlock {\n"
              "            CoreError::Busy(format!(\n"
              "                \"persistent SurrealKV store {} is already locked by another process\",\n"
              "                canonical_store.display()\n"
              "            ))\n"
              "        } else {\n"
              "            CoreError::Adapter(format!(\n"
              "                \"failed to acquire persistent SurrealKV lease {}: {error}\",\n"
              "                lock_path.display()\n"
              "            ))\n"
              "        }\n"
              "    })?;\n"
              "    Ok(Some(Arc::new(file)))\n"
              "}\n"
          )
          if text.count(boundary_anchor) != 1:
              raise SystemExit(
                  "Surreal facade: expected one connection boundary anchor, "
                  f"found {text.count(boundary_anchor)}"
              )
          facade.write_text(text.replace(boundary_anchor, boundary_replacement, 1))

          Path(".github/workflows/test-remediation-v20.yml").unlink()
          PY
            cargo metadata --format-version 1 > /dev/null
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v20.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          .github/workflows/test-remediation-v14.yml
          .github/workflows/test-remediation-v15.yml
          .github/workflows/test-remediation-v16.yml
          .github/workflows/test-remediation-v17.yml
          .github/workflows/test-remediation-v18.yml
          .github/workflows/test-remediation-v19.yml
          .github/workflows/test-remediation-v20.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          crates/athanor-app/tests/legacy_factory_migration.rs
          crates/athanor-app/tests/mcp_runtime_bootstrap_inventory.rs
          crates/athanor-app/tests/runtime_modularity_inventory.rs
          crates/athanor-app/tests/service_composition_inventory.rs
          crates/athanor-core/src/read_operation.rs
          crates/athanor-store-surrealdb/Cargo.toml
          crates/athanor-store-surrealdb/src/backend_store.rs
          crates/athanor-store-surrealdb/src/facade.rs
          crates/athanor-store-surrealdb/tests/persistent_lock.rs
          docs/development/json-contract-inventory.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(store): enforce persistent SurrealKV process lease"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v20-diagnostics
          path: ${{ runner.temp }}/test-remediation-v20.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V20 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V20 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v20",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
