name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-contract:
    name: Verify release contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify release tag and prepare notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          python3 scripts/verify_release_version.py
          --tag "$RELEASE_TAG"
          --changelog CHANGELOG.md
          --notes-output dist/release-notes.md
          apps/ath/Cargo.toml
          apps/athd/Cargo.toml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-contract
          path: dist/release-notes.md

  build:
    needs: release-contract
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: athanor-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: athanor-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo build --release --locked --target ${{ matrix.target }} -p ath -p athd
      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/athanor
          cp target/${{ matrix.target }}/release/ath target/${{ matrix.target }}/release/athd README.md CHANGELOG.md LICENSE install.sh dist/athanor/
          chmod +x dist/athanor/ath dist/athanor/athd dist/athanor/install.sh
          (cd dist/athanor && sha256sum ath athd > SHA256SUMS)
          tar -C dist -czf dist/${{ matrix.archive }} athanor
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/athanor | Out-Null
          Copy-Item target/${{ matrix.target }}/release/ath.exe,target/${{ matrix.target }}/release/athd.exe,README.md,CHANGELOG.md,LICENSE,install.ps1 dist/athanor/
          $manifest = foreach ($file in @("ath.exe", "athd.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path "dist/athanor" $file)).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $manifest | Set-Content -LiteralPath dist/athanor/SHA256SUMS -Encoding ascii
          Compress-Archive -Path dist/athanor/* -DestinationPath dist/${{ matrix.archive }}
      - name: Write checksum
        shell: bash
        run: |
          cd dist
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign archive and checksum
        shell: bash
        run: |
          cosign sign-blob --yes --bundle "dist/${{ matrix.archive }}.sigstore.json" "dist/${{ matrix.archive }}"
          cosign sign-blob --yes --bundle "dist/${{ matrix.archive }}.sha256.sigstore.json" "dist/${{ matrix.archive }}.sha256"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/${{ matrix.archive }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive }}*

  sbom:
    name: CycloneDX SBOM
    needs: release-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate and package workspace SBOMs
        shell: bash
        run: |
          set -euo pipefail
          cargo cyclonedx --format json --all-features --target all --spec-version 1.5
          mkdir -p dist
          find . -path './target' -prune -o -type f -name '*.cdx.json' -print0 \
            | sort -z > dist/sbom-files.bin
          test -s dist/sbom-files.bin
          python3 - <<'PY'
          import json
          from pathlib import Path

          entries = [
              Path(raw.decode())
              for raw in Path("dist/sbom-files.bin").read_bytes().split(b"\0")
              if raw
          ]
          assert entries, "cargo-cyclonedx produced no *.cdx.json files"
          for path in entries:
              assert path.stat().st_size > 0, f"empty SBOM: {path}"
              payload = json.loads(path.read_text(encoding="utf-8"))
              assert payload.get("bomFormat") == "CycloneDX", f"invalid SBOM: {path}"
          PY
          tar --null --files-from dist/sbom-files.bin -czf dist/athanor-workspace-cyclonedx.tar.gz
          rm dist/sbom-files.bin
          (cd dist && sha256sum athanor-workspace-cyclonedx.tar.gz > athanor-workspace-cyclonedx.tar.gz.sha256)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign SBOM archive and checksum
        shell: bash
        run: |
          cosign sign-blob --yes --bundle dist/athanor-workspace-cyclonedx.tar.gz.sigstore.json dist/athanor-workspace-cyclonedx.tar.gz
          cosign sign-blob --yes --bundle dist/athanor-workspace-cyclonedx.tar.gz.sha256.sigstore.json dist/athanor-workspace-cyclonedx.tar.gz.sha256
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/athanor-workspace-cyclonedx.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: dist/athanor-workspace-cyclonedx.tar.gz*

  verify:
    name: Verify release assets
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify checksums, signatures, provenance, SBOM, and release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          test -s release-notes.md
          identity="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/v.*$"
          issuer="https://token.actions.githubusercontent.com"
          artifacts=(
            athanor-x86_64-unknown-linux-gnu.tar.gz
            athanor-x86_64-pc-windows-msvc.zip
            athanor-workspace-cyclonedx.tar.gz
          )
          for artifact in "${artifacts[@]}"; do
            test -s "$artifact"
            test -s "$artifact.sha256"
            test -s "$artifact.sigstore.json"
            test -s "$artifact.sha256.sigstore.json"
            sha256sum -c "$artifact.sha256"
            cosign verify-blob --bundle "$artifact.sigstore.json" --certificate-identity-regexp "$identity" --certificate-oidc-issuer "$issuer" "$artifact"
            cosign verify-blob --bundle "$artifact.sha256.sigstore.json" --certificate-identity-regexp "$identity" --certificate-oidc-issuer "$issuer" "$artifact.sha256"
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"
          done

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/athanor-x86_64-unknown-linux-gnu.tar.gz*
            dist/athanor-x86_64-pc-windows-msvc.zip*
            dist/athanor-workspace-cyclonedx.tar.gz*
          generate_release_notes: false
