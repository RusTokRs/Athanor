name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: athanor-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: athanor-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@81507be746c04af74ed35958a57969a1cfe076b5 # 1.100.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo build --release --locked --target ${{ matrix.target }} -p ath -p athd
      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/athanor
          cp target/${{ matrix.target }}/release/ath target/${{ matrix.target }}/release/athd README.md LICENSE install.sh dist/athanor/
          chmod +x dist/athanor/ath dist/athanor/athd dist/athanor/install.sh
          (cd dist/athanor && sha256sum ath athd > SHA256SUMS)
          tar -C dist -czf dist/${{ matrix.archive }} athanor
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/athanor | Out-Null
          Copy-Item target/${{ matrix.target }}/release/ath.exe,target/${{ matrix.target }}/release/athd.exe,README.md,LICENSE,install.ps1 dist/athanor/
          $manifest = foreach ($file in @("ath.exe", "athd.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path "dist/athanor" $file)).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $manifest | Set-Content -LiteralPath dist/athanor/SHA256SUMS -Encoding ascii
          Compress-Archive -Path dist/athanor/* -DestinationPath dist/${{ matrix.archive }}
      - name: Write checksum
        shell: bash
        run: |
          cd dist
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign archive and checksum
        shell: bash
        run: |
          cosign sign-blob --yes --bundle "dist/${{ matrix.archive }}.sigstore.json" "dist/${{ matrix.archive }}"
          cosign sign-blob --yes --bundle "dist/${{ matrix.archive }}.sha256.sigstore.json" "dist/${{ matrix.archive }}.sha256"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/${{ matrix.archive }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
