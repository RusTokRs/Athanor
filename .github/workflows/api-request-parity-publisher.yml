name: API Request Parity Publisher

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'automation/api-001-request-parity'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out head branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Install repository Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply bounded API request parity patch
        run: python3 scripts/automation/api_request_parity_patch.py
      - name: Format workspace
        run: cargo fmt --all
      - name: Test API checker
        run: cargo test -p athanor-checker-api --locked
      - name: Lint API checker
        run: cargo clippy -p athanor-checker-api --all-targets --locked -- -D warnings
      - name: Remove one-shot automation and publish product tree
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/api-request-parity-publisher.yml
          rm scripts/automation/api_request_parity_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/athanor-checker-api/src/lib.rs \
                  crates/athanor-checker-api/src/request_parity.rs \
                  docs/adapters/checker-api.md \
                  docs/development/roadmap-status.md \
                  athanor_implementation_plan_ru.md \
                  .github/workflows/api-request-parity-publisher.yml \
                  scripts/automation/api_request_parity_patch.py
          git commit -m "feat(api): compare request inputs across protocols"
          git push origin HEAD:${{ github.head_ref }}
