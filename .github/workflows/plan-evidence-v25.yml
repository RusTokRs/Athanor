name: Plan Evidence V25

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/plan-evidence-v25.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: plan-evidence-v25-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Update plan and publish
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("athanor_implementation_plan_ru.md")
          text = path.read_text()

          section_anchor = (
              "- [ ] Полная `athanor/verification-matrix` должна стать successful на "
              "опубликованном architecture commit до повышения пакетов до `[x] verified`.\n\n"
              "## 4. Следующие активные пакеты"
          )
          section_replacement = '''- [ ] Полная `athanor/verification-matrix` должна стать successful на опубликованном architecture commit до повышения пакетов до `[x] verified`.

### 3.12 `VERIFY-001G` — full workspace и cross-platform remediation

- [x] Run `29770365670` (V21) повторно подтвердил formatting, `athanor-app --lib`, executable CLI regression, полный workspace suite, `--all-features` check и оба Clippy.
- [x] Validated source commit `2b38618e4b53e3c5cbd3fc2d7c2eb2cc2cd16c43` опубликовал накопленные deterministic fixtures, cancellation leases, inventories, Surreal transaction retry и persistent process lease.
- [x] Standard matrix `29771122084` подтвердила security, coverage и все feature jobs; remaining failures были локализованы до platform path alias и executable mode `install.sh`.
- [x] Diagnostic run `29772014063` (V22) записал exact macOS `/private/var` vs `/var`, Windows long-path vs 8.3 alias и Linux `Permission denied` evidence.
- [x] Run `29775664727` (V24) подтвердил canonical cleanup paths на Linux, macOS и Windows, а также direct Linux installer checksum verification.
- [x] Validated source commit `c7d3fb541304d3c9c308192aff0c2d6736114a1f` нормализовал fixture expectations, установил executable git mode и физически удалил V22–V24.
- [ ] Финальная стандартная `athanor/verification-matrix` должна подтвердить exact plan/source HEAD.

## 4. Следующие активные пакеты'''
          if text.count(section_anchor) != 1:
              raise SystemExit(
                  "implementation plan: expected one VERIFY-001F/section-4 anchor, "
                  f"found {text.count(section_anchor)}"
              )
          text = text.replace(section_anchor, section_replacement, 1)

          stale_item = "- [ ] разобрать remaining tests/Clippy/coverage/smoke failures, если они останутся;"
          completed_item = "- [x] known tests/Clippy/coverage/installer failures разобраны и исправлены по exact diagnostics;"
          if text.count(stale_item) != 1:
              raise SystemExit(
                  "implementation plan: expected one remaining-failures item, "
                  f"found {text.count(stale_item)}"
              )
          text = text.replace(stale_item, completed_item, 1)

          table_anchor = (
              "| `VERIFY-001F` | P1 | `[x] implemented` | Structural MCP and execution blockers closed by validated V10 |\n"
              "| `VERIFY-001` | P1 | `[!] blocked` | Exact successful status or JSON evidence identifies one commit |"
          )
          table_replacement = (
              "| `VERIFY-001F` | P1 | `[x] implemented` | Structural MCP and execution blockers closed by validated V10 |\n"
              "| `VERIFY-001G` | P1 | `[x] implemented` | Full workspace and cross-platform blockers closed by validated V21/V24 |\n"
              "| `VERIFY-001` | P1 | `[!] blocked` | Exact successful status or JSON evidence identifies one commit |"
          )
          if text.count(table_anchor) != 1:
              raise SystemExit(
                  "implementation plan: expected one verification table anchor, "
                  f"found {text.count(table_anchor)}"
              )
          text = text.replace(table_anchor, table_replacement, 1)
          path.write_text(text)
          Path(".github/workflows/plan-evidence-v25.yml").unlink()
          PY

          git diff --check
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/expected-paths" <<'EOF'
          .github/workflows/plan-evidence-v25.yml
          athanor_implementation_plan_ru.md
          EOF
          sort -o "$RUNNER_TEMP/expected-paths" "$RUNNER_TEMP/expected-paths"
          diff -u "$RUNNER_TEMP/expected-paths" "$RUNNER_TEMP/actual-paths"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "docs(plan): record validated platform remediation"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
          validated_sha="$(git rev-parse HEAD)"
          echo "validated_sha=$validated_sha" >> "$GITHUB_OUTPUT"

          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches" \
            --data '{"ref":"main"}'
      - name: Publish exact plan-update status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Plan evidence V25 failed"
          if [[ "$PUBLISH_OUTCOME" == "success" ]]; then
            state="success"
            description="Plan evidence V25 published and CI dispatched"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/plan-evidence-v25",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
