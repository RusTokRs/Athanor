name: Prepare Release Lockfile

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: prepare-release-lock-main
  cancel-in-progress: false

jobs:
  update:
    name: Synchronize release package versions
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Update only release-package lock entries
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'version = "0.2.0"' apps/ath/Cargo.toml
          grep -Fx 'version = "0.2.0"' apps/athd/Cargo.toml

          python3 - <<'PY'
          from pathlib import Path

          path = Path("Cargo.lock")
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          package = None
          changed = {"ath": 0, "athd": 0}

          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "[[package]]":
                  package = None
              elif stripped.startswith('name = "') and stripped.endswith('"'):
                  package = stripped.removeprefix('name = "').removesuffix('"')
              elif package in changed and stripped.startswith('version = "'):
                  if stripped == 'version = "0.2.0"':
                      package = None
                      continue
                  assert stripped == 'version = "0.1.0"', (package, stripped)
                  newline = "\n" if line.endswith("\n") else ""
                  lines[index] = 'version = "0.2.0"' + newline
                  changed[package] += 1
                  package = None

          assert changed in ({"ath": 1, "athd": 1}, {"ath": 0, "athd": 0}), changed
          path.write_text("".join(lines), encoding="utf-8")
          PY

          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi

          diff_lines="$(git diff --unified=0 -- Cargo.lock | grep -E '^[+-]' || true)"
          old_count="$(printf '%s\n' "$diff_lines" | grep -c '^-version = "0.1.0"$' || true)"
          new_count="$(printf '%s\n' "$diff_lines" | grep -c '^+version = "0.2.0"$' || true)"
          unexpected="$(printf '%s\n' "$diff_lines" | grep -vE '^(---|\+\+\+|[-+]version = "0\.[12]\.0")$' || true)"
          test "$old_count" -eq 2
          test "$new_count" -eq 2
          test -z "$unexpected"

      - name: Commit synchronized lockfile
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "build: synchronize 0.2.0 release lockfile [skip ci]"
          git push origin HEAD:main
