name: DOCGEN Rustok Probe

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docgen-rustok-probe.yml"

permissions:
  contents: read
  statuses: write

env:
  RUSTOK_REVISION: 3b76a530c82c0faaed22ccec384d4fd950811862

jobs:
  probe:
    name: Probe index and generation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stage: ${{ steps.probe.outputs.stage }}
      code: ${{ steps.probe.outputs.code }}
      message: ${{ steps.probe.outputs.message }}
    steps:
      - name: Check out Athanor
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install repository Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Check out pinned RusTok subset
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: RusTokRs/RusTok
          ref: ${{ env.RUSTOK_REVISION }}
          path: target/rustok-evaluation/source
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Cargo.toml
            README.md
            modules.toml
            apps/server/Cargo.toml
            apps/server/src/modules
            crates/rustok-modules/Cargo.toml
            crates/rustok-modules/src
            crates/rustok-product/Cargo.toml
            crates/rustok-product/src
            docs/backend/module-backend-architecture.md
            docs/modules/registry.md

      - name: Build Athanor CLI quietly
        shell: bash
        run: cargo build -q -p ath --locked

      - name: Probe exact-snapshot path
        id: probe
        shell: bash
        env:
          SOURCE_ROOT: ${{ github.workspace }}/target/rustok-evaluation/source
        run: |
          set -uo pipefail
          stage=index
          output="$(target/debug/ath index "$SOURCE_ROOT" --json 2>&1)"
          code=$?
          if [ "$code" -eq 0 ]; then
            snapshot="$(printf '%s' "$output" | jq -er '.snapshot')"
            stage=generate
            output="$(target/debug/ath docs generate-architecture "$SOURCE_ROOT" \
              --snapshot "$snapshot" \
              --max-entities 96 \
              --max-facts 192 \
              --max-relations 192 \
              --max-diagnostics 96 \
              --json 2>&1)"
            code=$?
          fi
          message="$(printf '%s\n' "$output" \
            | tail -n 1 \
            | sed "s#${{ github.workspace }}#\$WORKSPACE#g" \
            | tr '\r\n' '  ' \
            | cut -c1-240)"
          printf 'stage=%s\n' "$stage" >> "$GITHUB_OUTPUT"
          printf 'code=%s\n' "$code" >> "$GITHUB_OUTPUT"
          printf 'message=%s\n' "$message" >> "$GITHUB_OUTPUT"

  report:
    name: Report sanitized probe result
    needs: probe
    runs-on: ubuntu-latest
    steps:
      - name: Print sanitized result
        shell: bash
        env:
          STAGE: ${{ needs.probe.outputs.stage }}
          CODE: ${{ needs.probe.outputs.code }}
          MESSAGE: ${{ needs.probe.outputs.message }}
        run: |
          printf 'stage=%s\ncode=%s\nmessage=%s\n' "$STAGE" "$CODE" "$MESSAGE"

      - name: Publish probe status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/$SHA" \
            -d "$(jq -nc --arg target_url "$RUN_URL" '{state:"success",context:"athanor/rustok-docgen-probe",description:"sanitized evaluation probe ready",target_url:$target_url}')"
