name: Test Remediation V19

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v19.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v19-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "a81f2839ccf02628e9b0425efedd65387ce2e396:"
                  ".github/workflows/test-remediation-v18.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "test-remediation-v19-base",
                  "exec",
              ),
              {"__builtins__": __builtins__},
          )

          backend = Path("crates/athanor-store-surrealdb/src/backend_store.rs")
          text = backend.read_text()
          derive_anchor = "#[derive(Debug, Serialize, Deserialize)]\nstruct SnapshotRecord"
          derive_replacement = "#[derive(Debug, Clone, Serialize, Deserialize)]\nstruct SnapshotRecord"
          if text.count(derive_anchor) != 1:
              raise SystemExit(
                  "Surreal snapshot record: expected one derive anchor, "
                  f"found {text.count(derive_anchor)}"
              )
          text = text.replace(derive_anchor, derive_replacement, 1)

          begin_start = text.index("    async fn begin_snapshot(")
          create_start = text.index(
              "        let _: Option<SnapshotRecord> = self", begin_start
          )
          create_end = text.index(
              "\n\n        Ok(SnapshotId(snapshot_id))", create_start
          )
          retry_create = (
              "        const MAX_ATTEMPTS: usize = 8;\n"
              "        for attempt in 0..MAX_ATTEMPTS {\n"
              "            let result: Result<Option<SnapshotRecord>, _> = self\n"
              "                .db\n"
              "                .create((\"snapshot\", &snapshot_id))\n"
              "                .content(record.clone())\n"
              "                .await;\n"
              "            match result {\n"
              "                Ok(_) => break,\n"
              "                Err(error)\n"
              "                    if attempt + 1 < MAX_ATTEMPTS\n"
              "                        && is_retryable_counter_conflict(&error.to_string()) =>\n"
              "                {\n"
              "                    sleep(Duration::from_millis(\n"
              "                        2_u64.saturating_pow(attempt as u32),\n"
              "                    ))\n"
              "                    .await;\n"
              "                }\n"
              "                Err(error) => {\n"
              "                    return Err(CoreError::Adapter(format!(\n"
              "                        \"failed to create snapshot record: {error}\"\n"
              "                    )));\n"
              "                }\n"
              "            }\n"
              "        }"
          )
          text = text[:create_start] + retry_create + text[create_end:]
          backend.write_text(text)

          Path(".github/workflows/test-remediation-v19.yml").unlink()
          PY
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v19.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          .github/workflows/test-remediation-v14.yml
          .github/workflows/test-remediation-v15.yml
          .github/workflows/test-remediation-v16.yml
          .github/workflows/test-remediation-v17.yml
          .github/workflows/test-remediation-v18.yml
          .github/workflows/test-remediation-v19.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          crates/athanor-app/tests/legacy_factory_migration.rs
          crates/athanor-app/tests/mcp_runtime_bootstrap_inventory.rs
          crates/athanor-app/tests/runtime_modularity_inventory.rs
          crates/athanor-app/tests/service_composition_inventory.rs
          crates/athanor-core/src/read_operation.rs
          crates/athanor-store-surrealdb/src/backend_store.rs
          crates/athanor-store-surrealdb/tests/persistent_lock.rs
          docs/development/json-contract-inventory.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(store): retry snapshot record transaction conflicts"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v19-diagnostics
          path: ${{ runner.temp }}/test-remediation-v19.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V19 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V19 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v19",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
