name: Test Remediation V14

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/test-remediation-v14.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: test-remediation-v14-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply deterministic test remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "d5f82adf48658c92cea0abcf21587ebc9cf3ca28:"
                  ".github/workflows/test-remediation-v13.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])
          if script.count("direct_patch = '''") != 1:
              raise SystemExit("V14: expected one direct_patch string")
          script = script.replace("direct_patch = '''", "direct_patch = r'''", 1)
          exec(
              compile(script, "test-remediation-v14", "exec"),
              {"__builtins__": __builtins__},
          )

          inventory = Path("crates/athanor-app/tests/context_composition_inventory.rs")
          inventory_text = inventory.read_text()
          old_phrase = (
              'CONTEXT_OPERATION_SOURCE.contains('
              '"composition.build_search_index_with_operation_context")'
          )
          new_phrase = (
              'CONTEXT_OPERATION_SOURCE.contains('
              '".build_search_index_with_operation_context(")'
          )
          if inventory_text.count(old_phrase) != 1:
              raise SystemExit(
                  "context composition inventory: expected one stale call phrase, "
                  f"found {inventory_text.count(old_phrase)}"
              )
          inventory.write_text(inventory_text.replace(old_phrase, new_phrase, 1))

          docs_inventory = Path(
              "crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs"
          )
          docs_text = docs_inventory.read_text()
          for old_docs, new_docs in [
              (
                  'CHECK_SOURCE.contains("policy.required_fields")',
                  'CHECK_SOURCE.contains(".required_fields")',
              ),
              (
                  'CHECK_SOURCE.contains("policy.allowed_statuses")',
                  'CHECK_SOURCE.contains(".allowed_statuses")',
              ),
          ]:
              if docs_text.count(old_docs) != 1:
                  raise SystemExit(
                      "docs lifecycle inventory: expected one stale assertion for "
                      f"{old_docs!r}, found {docs_text.count(old_docs)}"
                  )
              docs_text = docs_text.replace(old_docs, new_docs, 1)
          docs_inventory.write_text(docs_text)

          json_inventory = Path("crates/athanor-app/tests/json_contract_inventory.rs")
          json_text = json_inventory.read_text()
          test_anchor = "#[test]\nfn schema_registries_are_valid_unique_and_disjoint() {\n"
          classifications = '''#[derive(Debug, Clone, Copy)]
          struct SourceLiteralJsonContract {
              schema: &'static str,
              owner: &'static str,
              lifecycle: BoundaryLifecycle,
          }

          const SOURCE_LITERAL_JSON_CONTRACTS: &[SourceLiteralJsonContract] = &[
              SourceLiteralJsonContract { schema: "athanor.api_registry.v1", owner: "ApiRegistryReport", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.api_strict_check.v1", owner: "DirectCheckStrictEnvelope", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.daemon_doctor.v1", owner: "DaemonDoctorReport", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.daemon_service.v1", owner: "DaemonServiceStatus", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.graphql_directive.v1", owner: "GraphqlDirectivePayload", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.graphql_fragment.v1", owner: "GraphqlFragmentPayload", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.graphql_operation.v1", owner: "GraphqlOperationPayload", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.graphql_schema.v1", owner: "GraphqlSchemaPayload", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.js_ts_precision.v1", owner: "JsTsPrecisionPayload", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.path_index.v1", owner: "JsonlPathIndex", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.stable_key_index.v1", owner: "JsonlStableKeyIndex", lifecycle: BoundaryLifecycle::Current },
              SourceLiteralJsonContract { schema: "athanor.daemon_request.v1", owner: "DaemonRequest", lifecycle: BoundaryLifecycle::Historical },
              SourceLiteralJsonContract { schema: "athanor.daemon_request.v2", owner: "DaemonRequest", lifecycle: BoundaryLifecycle::LegacyInput },
              SourceLiteralJsonContract { schema: "athanor.daemon_response.v2", owner: "DaemonResponse", lifecycle: BoundaryLifecycle::LegacyInput },
              SourceLiteralJsonContract { schema: "athanor.repair_cleanup.v1", owner: "RepairCleanupReport", lifecycle: BoundaryLifecycle::LegacyInput },
              SourceLiteralJsonContract { schema: "athanor.repair_inspect.v1", owner: "RepairInspectReport", lifecycle: BoundaryLifecycle::LegacyInput },
          ];

          '''
          if json_text.count(test_anchor) != 1:
              raise SystemExit("json inventory: schema registry test anchor missing")
          json_text = json_text.replace(test_anchor, classifications + test_anchor, 1)

          scan_anchor = '''    let classified = classified_schemas();
              let mut observed = BTreeMap::<String, BTreeSet<PathBuf>>::new();'''
          scan_replacement = '''    let classified = classified_schemas();
              let mut source_classifications = BTreeSet::new();
              for contract in SOURCE_LITERAL_JSON_CONTRACTS {
                  validate_schema_id(contract.schema).unwrap_or_else(|error| {
                      panic!("source literal schema {} is not canonical: {error}", contract.schema)
                  });
                  assert!(!contract.owner.is_empty());
                  assert!(source_classifications.insert(contract.schema));
                  match contract.lifecycle {
                      BoundaryLifecycle::Current
                      | BoundaryLifecycle::LegacyInput
                      | BoundaryLifecycle::Historical => {}
                  }
              }
              let mut observed = BTreeMap::<String, BTreeSet<PathBuf>>::new();'''
          if json_text.count(scan_anchor) != 1:
              raise SystemExit("json inventory: scan setup anchor missing")
          json_text = json_text.replace(scan_anchor, scan_replacement, 1)

          loop_anchor = '''        for schema in extract_schema_literals(production_prefix(&source)) {
                  observed'''
          loop_replacement = '''        for schema in extract_schema_literals(production_prefix(&source)) {
                  if validate_schema_id(&schema).is_err() {
                      continue;
                  }
                  observed'''
          if json_text.count(loop_anchor) != 1:
              raise SystemExit("json inventory: observed schema loop anchor missing")
          json_text = json_text.replace(loop_anchor, loop_replacement, 1)

          chain_anchor = '''        .chain(
                      AUTOMATION_JSON_CONTRACTS
                          .iter()
                          .map(|contract| contract.schema),
                  )
                  .collect()'''
          chain_replacement = '''        .chain(
                      AUTOMATION_JSON_CONTRACTS
                          .iter()
                          .map(|contract| contract.schema),
                  )
                  .chain(
                      SOURCE_LITERAL_JSON_CONTRACTS
                          .iter()
                          .map(|contract| contract.schema),
                  )
                  .collect()'''
          if json_text.count(chain_anchor) != 1:
              raise SystemExit("json inventory: classified schema chain anchor missing")
          json_inventory.write_text(json_text.replace(chain_anchor, chain_replacement, 1))

          contract_doc = Path("docs/development/json-contract-inventory.md")
          contract_text = contract_doc.read_text()
          enforcement_anchor = "## Enforcement implementation\n"
          source_section = '''## Source-literal classifications

          Sixteen canonical `athanor.*` literals are explicitly classified with a Rust owner and
          lifecycle even though they are not members of the stable public/general registries. They
          cover composite CLI and daemon envelopes, embedded GraphQL/JS-TS metadata, JSONL indexes,
          and accepted legacy daemon/Repair inputs. The source scanner validates their canonical ids,
          uniqueness, ownership, lifecycle, and observability.

          Non-canonical Athanor-prefixed strings such as the `athanor.index_state.v` validation prefix
          and the `athanor.toml` filename are not schema ids and are excluded only after
          `validate_schema_id` rejects them.

          '''
          if contract_text.count(enforcement_anchor) != 1:
              raise SystemExit("json contract guide: enforcement anchor missing")
          contract_doc.write_text(
              contract_text.replace(enforcement_anchor, source_section + enforcement_anchor, 1)
          )

          Path(".github/workflows/test-remediation-v14.yml").unlink()
          PY
            cargo fmt --all
            cargo fmt --all -- --check
            cargo test -p athanor-app --lib --locked
            cargo test -p ath --test index_checksum_cli --locked
            cargo test --workspace --quiet --locked
            cargo check --workspace --all-features --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/test-remediation-v14.log"
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/workflows/test-remediation-v11.yml
          .github/workflows/test-remediation-v12.yml
          .github/workflows/test-remediation-v13.yml
          .github/workflows/test-remediation-v14.yml
          crates/athanor-app/src/index_publication_finalize_tests_inner.rs
          crates/athanor-app/src/repair_composition/direct.rs
          crates/athanor-app/src/runtime/process_runner.rs
          crates/athanor-app/src/search_operation.rs
          crates/athanor-app/tests/context_composition_inventory.rs
          crates/athanor-app/tests/docs_completeness_lifecycle_inventory.rs
          crates/athanor-app/tests/json_contract_inventory.rs
          docs/development/json-contract-inventory.md
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "test(app): align deterministic publication and cancellation fixtures"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
      - name: Upload diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-remediation-v14-diagnostics
          path: ${{ runner.temp }}/test-remediation-v14.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Test remediation V14 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Test remediation V14 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/test-remediation-v14",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
