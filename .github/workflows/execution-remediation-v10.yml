name: Execution Remediation V10

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/execution-remediation-v10.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: execution-remediation-v10-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply validated execution remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "671ad1a8e91f49cfc7a88b35464fd3cd586a52ab:"
                  ".github/workflows/execution-remediation-v10.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "execution-remediation-v10-base",
                  "exec",
              ),
              {"__builtins__": __builtins__},
          )

          inventory = Path(
              "crates/athanor-app/tests/read_service_composition_inventory.rs"
          )
          inventory_text = inventory.read_text()
          path_replacements = [
              (
                  'include_str!("../src/repair_latest.rs")',
                  'include_str!("../src/repair/mod.rs")',
              ),
              (
                  'include_str!("../src/repair_recovery.rs")',
                  'include_str!("../src/repair/cleanup_recovery/recovery.rs")',
              ),
          ]
          for old_path, new_path in path_replacements:
              if inventory_text.count(old_path) != 1:
                  raise SystemExit(
                      "read-service inventory: expected one migrated Repair path "
                      f"for {old_path!r}"
                  )
              inventory_text = inventory_text.replace(old_path, new_path, 1)
          inventory.write_text(inventory_text)

          cli_test = Path("apps/ath/src/direct_validate_changed_cli.rs")
          cli_text = cli_test.read_text()
          old_compare = 'path == PathBuf::from("repo")'
          new_compare = 'path == Path::new("repo")'
          if cli_text.count(old_compare) != 1:
              raise SystemExit(
                  "validate-changed CLI test: expected one owned path comparison"
              )
          cli_text = cli_text.replace(old_compare, new_compare, 1)
          old_import = "use std::path::PathBuf;"
          new_import = "use std::path::{Path, PathBuf};"
          if cli_text.count(old_import) != 1:
              raise SystemExit(
                  "validate-changed CLI test: expected one PathBuf import"
              )
          cli_test.write_text(cli_text.replace(old_import, new_import, 1))

          allowed_path = Path(os.environ["RUNNER_TEMP"]).joinpath("allowed-paths")
          allowed = {
              line.strip()
              for line in allowed_path.read_text().splitlines()
              if line.strip()
          }
          allowed.update({inventory.as_posix(), cli_test.as_posix()})
          allowed_path.write_text("\n".join(sorted(allowed)) + "\n")
          PY
            cargo update -p oxc_parser@0.138.0 --precise 0.139.0
            cargo fmt --all
            cargo fmt --all -- --check
            cargo check --workspace --locked
            cargo check --workspace --all-features --locked
            cargo test -p ath --test executable_shared_report_cli --locked
            cargo test -p athanor-transport-mcp server::operation --locked
            cargo test -p athanor-transport-mcp server::tests --locked
            cargo test -p athanor-transport-mcp --test index_publication_cancellation_inventory --locked
            cargo test -p athanor-transport-mcp --test control_plane_saturation_inventory --locked
            cargo test -p athanor-transport-mcp --test mcp_transport_contracts --locked
            cargo test -p athanor-transport-mcp --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/execution-remediation-v10.log"
      - name: Record validated remediation evidence
        id: evidence
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "1d41f56155445872aadc8d9cbd0fa0f294908c53:"
                  ".github/workflows/execution-remediation-v10.yml",
              ],
              text=True,
          )
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "execution-remediation-v10-evidence",
                  "exec",
              )
          )
          PY
      - name: Commit validated source remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' && steps.evidence.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): publish validated execution remediation"
          git push origin HEAD:main
      - name: Upload remediation diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: execution-remediation-v10-diagnostics
          path: ${{ runner.temp }}/execution-remediation-v10.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Execution remediation v10 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$EVIDENCE_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Execution remediation v10 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/execution-remediation-v10",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
