name: Execution Remediation V10

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/execution-remediation-v10.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: execution-remediation-v10-main
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply validated execution remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          import subprocess
          import textwrap

          workflow = subprocess.check_output(
              [
                  "git",
                  "show",
                  "7f9582b2209b8a28d2961f008946c413fe3939c8:"
                  ".github/workflows/execution-remediation-v10.yml",
              ],
              text=True,
          )
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          exec(
              compile(
                  textwrap.dedent(workflow[start:end]),
                  "execution-remediation-v10",
                  "exec",
              ),
              {"__builtins__": __builtins__},
          )
          PY
            cargo update -p oxc_parser@0.138.0 --precise 0.139.0
            cargo fmt --all
            cargo fmt --all -- --check
            cargo check --workspace --locked
            cargo check --workspace --all-features --locked
            cargo test -p ath --test executable_shared_report_cli --locked
            cargo test -p athanor-transport-mcp server::operation --locked
            cargo test -p athanor-transport-mcp server::tests --locked
            cargo test -p athanor-transport-mcp --test index_publication_cancellation_inventory --locked
            cargo test -p athanor-transport-mcp --test control_plane_saturation_inventory --locked
            cargo test -p athanor-transport-mcp --test mcp_transport_contracts --locked
            cargo test -p athanor-transport-mcp --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/execution-remediation-v10.log"
      - name: Record validated remediation evidence
        id: evidence
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          plan = Path("athanor_implementation_plan_ru.md")
          text = plan.read_text()
          run_id = os.environ["GITHUB_RUN_ID"]

          section_anchor = "## 4. Следующие активные пакеты\n"
          if text.count(section_anchor) != 1:
              raise SystemExit(
                  "plan: expected one active-packages heading, "
                  f"found {text.count(section_anchor)}"
              )
          if "### 3.11 `VERIFY-001F`" not in text:
              section = f"""### 3.11 `VERIFY-001F` — validated execution remediation V10

          - [x] Run `29739854537` подтвердил Rust 1.95 setup, formatting и cargo-deny; workspace/feature execution остановилась на source blockers.
          - [x] Run `29741168520` повторно подтвердил formatting и security, сохранив exact failed matrix evidence для оставшегося compile path.
          - [x] Run `29744943097` подтвердил OXC family 0.139 с `--all-features`, executable CLI JSON regression и прохождение Repair cleanup до Clippy.
          - [x] Run `29754747369` подтвердил targeted MCP suite, default Clippy и all-features Clippy; source publication остановилась только на дефектном evidence anchor.
          - [x] `RequestRuntime` владеет MCP lifecycle dependencies; `process_line` больше не имеет восемь аргументов.
          - [x] Tool dispatch принимает `&Path`; `ProtocolFailure` хранит boxed `RpcError` без изменения parser signature и JSON-RPC поведения.
          - [x] Targeted MCP suite, default/all-features check и Clippy повторно выполнены успешно в publication run `{run_id}`.
          - [x] Временные execution/source-warning remediation workflows физически удалены из validated source commit.
          - [ ] Полная `athanor/verification-matrix` должна стать successful на опубликованном architecture commit до повышения пакетов до `[x] verified`.

          """
              text = text.replace(section_anchor, section + section_anchor, 1)

          table_anchor = (
              "| `VERIFY-001E` | P1 | `[x] implemented` | "
              "Fmt, compile owners and advisory lockfile remediated |\n"
          )
          if text.count(table_anchor) != 1:
              raise SystemExit(
                  "plan: expected one VERIFY-001E table row, "
                  f"found {text.count(table_anchor)}"
              )
          if "| `VERIFY-001F` |" not in text:
              text = text.replace(
                  table_anchor,
                  table_anchor
                  + "| `VERIFY-001F` | P1 | `[x] implemented` | "
                  + "Structural MCP and execution blockers closed by validated V10 |\n",
                  1,
              )

          journal_anchor = "### 2026-07-20 — Project-level CI remediation\n"
          if text.count(journal_anchor) != 1:
              raise SystemExit(
                  "plan: expected one project-level journal heading, "
                  f"found {text.count(journal_anchor)}"
              )
          if "### 2026-07-20 — Validated execution remediation V10" not in text:
              journal = f"""### 2026-07-20 — Validated execution remediation V10

          - Diagnostic runs `29739854537`, `29741168520` и `29744943097` сведены в один source remediation.
          - Run `29754747369` доказал successful targeted MCP suite и оба Clippy; publication была заблокирована только evidence writer.
          - MCP lifecycle, path ownership, protocol error size и физическая Repair migration исправлены структурно, без lint suppressions.
          - Publication run `{run_id}` повторно проверил source patch до прямой публикации в `main`.
          - Временные remediation workflows удалены.
          - Status — implemented; полная exact verification matrix остаётся обязательной.

          """
              text = text.replace(journal_anchor, journal + journal_anchor, 1)

          plan.write_text(text)
          PY
      - name: Commit validated source remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' && steps.evidence.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          diff -u "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): publish validated execution remediation"
          git push origin HEAD:main
      - name: Upload remediation diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: execution-remediation-v10-diagnostics
          path: ${{ runner.temp }}/execution-remediation-v10.log
          if-no-files-found: error
          retention-days: 14
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Execution remediation v10 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$EVIDENCE_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Execution remediation v10 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/execution-remediation-v10",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
