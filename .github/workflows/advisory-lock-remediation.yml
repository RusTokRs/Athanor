name: Advisory Lock Remediation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/advisory-lock-remediation.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: advisory-lock-remediation-main
  cancel-in-progress: false

jobs:
  update-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Generate exact patched lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo update -p anyhow --precise 1.0.103
          cargo update -p ammonia --precise 4.1.3
          cargo update -p crossbeam-epoch --precise 0.9.20
          changed="$(git diff --name-only)"
          test "$changed" = "Cargo.lock"
          cargo check --workspace --locked
      - name: Verify security policy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/cargo-deny-bin"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-all-errors \
            --location --silent --show-error --fail \
            https://github.com/EmbarkStudios/cargo-deny/releases/download/0.20.2/cargo-deny-0.20.2-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/cargo-deny-bin" --strip-components=1
          "$RUNNER_TEMP/cargo-deny-bin/cargo-deny" check
      - name: Commit patched lockfile
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already contains the patched dependency graph"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          test "$(git diff --cached --name-only)" = "Cargo.lock"
          git commit -m "fix(deps): remediate cargo-deny advisories"
          git push origin HEAD:main
