name: Matrix Remediation V29

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-remediation-v29.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: matrix-remediation-v29-main
  cancel-in-progress: true

jobs:
  quality:
    name: Quality remediation / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Apply deterministic remediation
        id: patch
        shell: bash
        run: python .github/scripts/matrix_remediation_v28.py
      - name: Check formatting
        id: fmt
        if: ${{ steps.patch.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all
          cargo fmt --all -- --check 2>&1 | tee "$RUNNER_TEMP/fmt.log"
      - name: Run workspace tests
        id: tests
        if: ${{ steps.patch.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --quiet --locked 2>&1 | tee "$RUNNER_TEMP/workspace.log"
      - name: Run Clippy
        id: clippy
        if: ${{ steps.patch.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 | tee "$RUNNER_TEMP/clippy.log"
      - name: Run indexing smoke test
        id: index
        if: ${{ steps.patch.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo run -p ath --quiet --locked -- index . 2>&1 | tee "$RUNNER_TEMP/index.log"
      - name: Capture canonical state
        if: ${{ always() && steps.patch.outcome == 'success' }}
        shell: bash
        run: |
          {
            echo "runner_os=$RUNNER_OS"
            echo "pwd=$PWD"
            find .athanor -maxdepth 5 -type f -print 2>/dev/null | sort || true
            for file in \
              .athanor/state/index-state.json \
              .athanor/state/index-current.json \
              .athanor/store/canonical/jsonl/latest.json \
              .athanor/store/canonical/jsonl/snapshot-sequence.json; do
              if [[ -f "$file" ]]; then
                echo "--- $file"
                cat "$file"
              fi
            done
          } > "$RUNNER_TEMP/canonical-state.log" 2>&1
      - name: Check editable documentation
        id: docs
        if: ${{ steps.patch.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo run -p ath --quiet --locked -- docs check 2>&1 | tee "$RUNNER_TEMP/docs.log"
      - name: Upload quality diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-v29-${{ runner.os }}
          path: |
            ${{ runner.temp }}/fmt.log
            ${{ runner.temp }}/workspace.log
            ${{ runner.temp }}/clippy.log
            ${{ runner.temp }}/index.log
            ${{ runner.temp }}/canonical-state.log
            ${{ runner.temp }}/docs.log
          if-no-files-found: warn
          retention-days: 14
      - name: Preserve quality conclusion
        if: ${{ always() }}
        shell: bash
        env:
          PATCH_OUTCOME: ${{ steps.patch.outcome }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          CLIPPY_OUTCOME: ${{ steps.clippy.outcome }}
          INDEX_OUTCOME: ${{ steps.index.outcome }}
          DOCS_OUTCOME: ${{ steps.docs.outcome }}
        run: |
          set -euo pipefail
          for outcome in \
            "$PATCH_OUTCOME" \
            "$FMT_OUTCOME" \
            "$TEST_OUTCOME" \
            "$CLIPPY_OUTCOME" \
            "$INDEX_OUTCOME" \
            "$DOCS_OUTCOME"; do
            test "$outcome" = success
          done
      - name: Test Linux installer checksum verification
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test_dir="$(mktemp -d)"
          trap 'rm -rf "$test_dir"' EXIT
          cp install.sh "$test_dir/"
          printf 'ath-test\n' > "$test_dir/ath"
          printf 'athd-test\n' > "$test_dir/athd"
          (cd "$test_dir" && sha256sum ath athd > SHA256SUMS)
          ATHANOR_INSTALL_DIR="$test_dir/install" "$test_dir/install.sh"
          cmp "$test_dir/ath" "$test_dir/install/ath"
          cmp "$test_dir/athd" "$test_dir/install/athd"
          printf 'tampered\n' >> "$test_dir/ath"
          if ATHANOR_INSTALL_DIR="$test_dir/rejected" "$test_dir/install.sh"; then
            echo "tampered Linux binary was accepted" >&2
            exit 1
          fi
      - name: Test Windows installer checksum verification
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testDir = Join-Path $env:RUNNER_TEMP "athanor-installer-test"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $testDir
          New-Item -ItemType Directory -Force $testDir | Out-Null
          Copy-Item install.ps1 $testDir
          Set-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "ath-test" -Encoding ascii
          Set-Content -LiteralPath (Join-Path $testDir "athd.exe") -Value "athd-test" -Encoding ascii
          $manifest = foreach ($file in @("ath.exe", "athd.exe")) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $manifest | Set-Content -LiteralPath (Join-Path $testDir "SHA256SUMS") -Encoding ascii
          & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "install")
          foreach ($file in @("ath.exe", "athd.exe")) {
            $sourceHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $testDir $file)).Hash
            $installedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path (Join-Path $testDir "install") $file)).Hash
            if ($sourceHash -ne $installedHash) { throw "installed file differs: $file" }
          }
          Add-Content -LiteralPath (Join-Path $testDir "ath.exe") -Value "tampered" -Encoding ascii
          $rejected = $false
          try {
            & (Join-Path $testDir "install.ps1") -InstallDir (Join-Path $testDir "rejected")
          } catch {
            $rejected = $true
          }
          if (-not $rejected) { throw "tampered Windows binary was accepted" }

  store-surreal:
    name: Store Surreal remediation
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Apply deterministic remediation
        shell: bash
        run: python .github/scripts/matrix_remediation_v28.py
      - name: Run Store Surreal feature gate
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          cargo check --workspace --features store-surreal --locked
          cargo test --workspace --quiet --features store-surreal --locked
          cargo clippy --workspace --all-targets --features store-surreal --locked -- -D warnings

  publish:
    name: Publish validated remediation
    if: ${{ always() }}
    needs: [quality, store-surreal]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        if: ${{ needs.quality.result == 'success' && needs.store-surreal.result == 'success' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Apply, document, and publish remediation
        id: commit
        if: ${{ needs.quality.result == 'success' && needs.store-surreal.result == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python .github/scripts/matrix_remediation_v28.py --publish
          python - <<'PY'
          import os
          from pathlib import Path

          plan = Path("athanor_implementation_plan_ru.md")
          text = plan.read_text()
          run_id = os.environ["GITHUB_RUN_ID"]
          old = (
              f"- [x] Run `{run_id}` (V28) подтвердил quality chain на трёх ОС "
              "и exact `store-surreal` feature slice перед публикацией этого source commit."
          )
          new = (
              "- [x] Run `29779895591` (V28) подтвердил полный `store-surreal` "
              "check/test/Clippy и сохранил раздельную quality диагностику.\n"
              f"- [x] Run `{run_id}` (V29) подтвердил quality chain на трёх ОС, "
              "index/docs smoke и повторный exact `store-surreal` feature slice перед публикацией."
          )
          if text.count(old) != 1:
              raise SystemExit(f"plan: expected one generated V28 line, found {text.count(old)}")
          text = text.replace(old, new, 1)
          old_cleanup = (
              "- [x] Временные V25–V28 workflows и remediation script физически удалены "
              "validated commit."
          )
          new_cleanup = (
              "- [x] Временные V25–V29 workflows и remediation script физически удалены "
              "validated commit."
          )
          if text.count(old_cleanup) != 1:
              raise SystemExit(
                  f"plan: expected one V25–V28 cleanup line, found {text.count(old_cleanup)}"
              )
          plan.write_text(text.replace(old_cleanup, new_cleanup, 1))
          Path(".github/workflows/matrix-remediation-v29.yml").unlink()
          PY
          cargo fmt --all
          git diff --check
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          cat > "$RUNNER_TEMP/allowed-paths" <<'EOF'
          .github/scripts/matrix_remediation_v28.py
          .github/workflows/matrix-diagnostics-v26.yml
          .github/workflows/matrix-remediation-v27.yml
          .github/workflows/matrix-remediation-v28.yml
          .github/workflows/matrix-remediation-v29.yml
          .github/workflows/plan-evidence-v25.yml
          athanor_implementation_plan_ru.md
          crates/athanor-app/src/index_runtime.rs
          crates/athanor-app/src/index_runtime_tests.rs
          crates/athanor-app/src/runtime/tests/process.rs
          crates/athanor-app/tests/api_composition_inventory.rs
          crates/athanor-store-surrealdb/src/backend_store.rs
          EOF
          sort -o "$RUNNER_TEMP/allowed-paths" "$RUNNER_TEMP/allowed-paths"
          comm -23 "$RUNNER_TEMP/actual-paths" "$RUNNER_TEMP/allowed-paths" > "$RUNNER_TEMP/unexpected-paths"
          test ! -s "$RUNNER_TEMP/unexpected-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): close remaining cross-platform matrix blockers"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git push origin HEAD:main
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches" \
            --data '{"ref":"main"}'
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          SURREAL_RESULT: ${{ needs.store-surreal.result }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Matrix remediation V29 failed"
          if [[ "$QUALITY_RESULT" == "success" && "$SURREAL_RESULT" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Matrix remediation V29 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/matrix-remediation-v29",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
