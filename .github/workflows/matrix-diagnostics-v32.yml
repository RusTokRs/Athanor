name: Matrix Diagnostics V32

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-diagnostics-v32.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: matrix-diagnostics-v32-main
  cancel-in-progress: true

jobs:
  windows:
    name: Post-CRLF Windows workspace diagnostics
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Apply deterministic remediation
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/matrix_remediation_v28.py
          python .github/scripts/matrix_remediation_v30.py
          python .github/scripts/matrix_remediation_v31.py
          python .github/scripts/matrix_remediation_v33.py
          cargo fmt --all
          cargo fmt --all -- --check
      - name: Run Windows workspace tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --quiet --locked 2>&1 | tee "$RUNNER_TEMP/windows-workspace-post-crlf.log"
      - name: Upload Windows diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-workspace-post-crlf
          path: ${{ runner.temp }}/windows-workspace-post-crlf.log
          if-no-files-found: error
          retention-days: 14
      - name: Preserve Windows conclusion
        if: ${{ always() }}
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        shell: bash
        run: test "$TEST_OUTCOME" = success

  status:
    name: Publish Windows diagnostic status
    if: ${{ always() }}
    needs: [windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish exact status
        env:
          GH_TOKEN: ${{ github.token }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [[ "$WINDOWS_RESULT" == success ]]; then state=success; fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="athanor/matrix-diagnostics-v32" \
            -f description="Post-CRLF Windows diagnostics: $state" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
