name: Matrix Diagnostics V32

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-diagnostics-v32.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: matrix-diagnostics-v32-main
  cancel-in-progress: true

jobs:
  scan:
    name: Newline-sensitive inventory scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Apply deterministic remediation
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/matrix_remediation_v28.py
          python .github/scripts/matrix_remediation_v30.py
          python .github/scripts/matrix_remediation_v31.py
          python .github/scripts/matrix_remediation_v33.py
      - name: Scan escaped newline assertions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > "$RUNNER_TEMP/newline-sensitive-inventories.txt"
          from pathlib import Path

          for path in sorted(Path("crates").rglob("*.rs")):
              lines = path.read_text().splitlines()
              for index, line in enumerate(lines, 1):
                  if "\\n" in line and ("contains" in line or "assert" in line):
                      print(f"{path}:{index}:{line.strip()}")
          PY
          cat "$RUNNER_TEMP/newline-sensitive-inventories.txt"
      - name: Upload scan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: newline-sensitive-inventories
          path: ${{ runner.temp }}/newline-sensitive-inventories.txt
          if-no-files-found: error
          retention-days: 14

  status:
    name: Publish scan status
    if: ${{ always() }}
    needs: [scan]
    runs-on: ubuntu-latest
    steps:
      - name: Publish exact status
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.scan.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [[ "$RESULT" == success ]]; then state=success; fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="athanor/matrix-diagnostics-v32" \
            -f description="Newline-sensitive inventory scan: $state" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
