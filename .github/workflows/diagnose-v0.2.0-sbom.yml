name: Diagnose v0.2.0 SBOM

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-v0.2.0-sbom.yml"

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Capture cargo-cyclonedx diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out failed release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: v0.2.0
          persist-credentials: false

      - uses: ./.github/actions/setup-rust

      - name: Capture install and generation output
        id: capture
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p sbom-diagnostic

          set +e
          cargo install cargo-cyclonedx --version 0.5.9 --locked \
            > sbom-diagnostic/install.log 2>&1
          install_code=$?
          cargo cyclonedx --format json --all-features --target all --spec-version 1.5 \
            > sbom-diagnostic/generate.log 2>&1
          generate_code=$?
          set -e

          find . -path './target' -prune -o -type f \
            \( -name 'bom.json' -o -name '*.cdx.json' -o -name '*cyclonedx*' \) \
            -print | sort > sbom-diagnostic/generated-files.txt
          {
            printf 'install_exit=%s\n' "$install_code"
            printf 'generate_exit=%s\n' "$generate_code"
            printf 'rustc=%s\n' "$(rustc --version)"
            printf 'cargo=%s\n' "$(cargo --version)"
            cargo cyclonedx --version 2>&1 || true
          } > sbom-diagnostic/summary.txt

          cat sbom-diagnostic/summary.txt
          echo '--- generation tail ---'
          tail -n 80 sbom-diagnostic/generate.log
          echo '--- generated files ---'
          cat sbom-diagnostic/generated-files.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v0.2.0-sbom-diagnostic
          path: sbom-diagnostic/
          if-no-files-found: error
          retention-days: 14

      - name: Publish diagnostic status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        run: |
          set -euo pipefail
          state="success"
          description="v0.2.0 SBOM diagnostic captured"
          if [[ "$CAPTURE_OUTCOME" != "success" ]]; then
            state="failure"
            description="v0.2.0 SBOM diagnostic failed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python3 - <<'PY' > diagnostic-status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/sbom-diagnostic",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @diagnostic-status.json
