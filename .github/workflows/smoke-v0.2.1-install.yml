name: Smoke v0.2.1 Installers

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/smoke-v0.2.1-install.yml"

permissions:
  contents: read
  statuses: write

jobs:
  linux:
    name: Clean Linux installation smoke
    runs-on: ubuntu-latest
    steps:
      - name: Download published archive and checksum
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release"
          cd "$RUNNER_TEMP/release"
          gh release download v0.2.1 \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'athanor-x86_64-unknown-linux-gnu.tar.gz' \
            --pattern 'athanor-x86_64-unknown-linux-gnu.tar.gz.sha256'
          sha256sum -c athanor-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Install into isolated prefix and execute binaries
        shell: bash
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release"
          extract_dir="$RUNNER_TEMP/extracted"
          install_dir="$RUNNER_TEMP/installed"
          mkdir -p "$extract_dir"
          tar -C "$extract_dir" -xzf "$release_dir/athanor-x86_64-unknown-linux-gnu.tar.gz"
          test ! -e "$install_dir/ath"
          test ! -e "$install_dir/athd"
          ATHANOR_INSTALL_DIR="$install_dir" sh "$extract_dir/athanor/install.sh"
          test -x "$install_dir/ath"
          test -x "$install_dir/athd"
          "$install_dir/ath" --help >/dev/null
          "$install_dir/athd" --help >/dev/null

  windows:
    name: Clean Windows installation smoke
    runs-on: windows-latest
    steps:
      - name: Download published archive and checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $ReleaseDir = Join-Path $env:RUNNER_TEMP "release"
          New-Item -ItemType Directory -Force -Path $ReleaseDir | Out-Null
          Set-Location $ReleaseDir
          gh release download v0.2.1 `
            --repo $env:GITHUB_REPOSITORY `
            --pattern 'athanor-x86_64-pc-windows-msvc.zip' `
            --pattern 'athanor-x86_64-pc-windows-msvc.zip.sha256'
          $Manifest = (Get-Content -LiteralPath "athanor-x86_64-pc-windows-msvc.zip.sha256" -Raw).Trim()
          if ($Manifest -notmatch '^([0-9A-Fa-f]{64})\s+\*?athanor-x86_64-pc-windows-msvc\.zip$') {
              throw "Invalid outer checksum manifest: $Manifest"
          }
          $Actual = (Get-FileHash -Algorithm SHA256 -LiteralPath "athanor-x86_64-pc-windows-msvc.zip").Hash
          if ($Actual -ne $Matches[1]) {
              throw "Outer archive checksum mismatch"
          }

      - name: Install into isolated prefix and execute binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ReleaseDir = Join-Path $env:RUNNER_TEMP "release"
          $ExtractDir = Join-Path $env:RUNNER_TEMP "extracted"
          $InstallDir = Join-Path $env:RUNNER_TEMP "installed"
          Expand-Archive -LiteralPath (Join-Path $ReleaseDir "athanor-x86_64-pc-windows-msvc.zip") -DestinationPath $ExtractDir
          if ((Test-Path -LiteralPath (Join-Path $InstallDir "ath.exe")) -or
              (Test-Path -LiteralPath (Join-Path $InstallDir "athd.exe"))) {
              throw "Installation prefix was not clean"
          }
          & (Join-Path $ExtractDir "install.ps1") -InstallDir $InstallDir
          foreach ($Binary in @("ath.exe", "athd.exe")) {
              $Path = Join-Path $InstallDir $Binary
              if (-not (Test-Path -LiteralPath $Path -PathType Leaf)) {
                  throw "Installed binary missing: $Path"
              }
              & $Path --help | Out-Null
              if ($LASTEXITCODE -ne 0) {
                  throw "$Binary --help failed with exit code $LASTEXITCODE"
              }
          }

  status:
    name: Publish installation smoke status
    if: always()
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish exact result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LINUX_RESULT: ${{ needs.linux.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
        run: |
          set -euo pipefail
          state=failure
          description="v0.2.1 installation smoke failed"
          if [[ "$LINUX_RESULT" == success && "$WINDOWS_RESULT" == success ]]; then
            state=success
            description="v0.2.1 Linux and Windows installation smokes passed"
          fi
          export STATE="$state" DESCRIPTION="$description"
          python3 - <<'PY' > "$RUNNER_TEMP/status.json"
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/release-install-smoke-v0.2.1",
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @"$RUNNER_TEMP/status.json"
          [[ "$state" == success ]]
