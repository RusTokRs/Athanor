name: Execution Remediation V8

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/execution-remediation-v8.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: execution-remediation-v8-main
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt
      - name: Apply and validate remediation
        id: remediate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path(".github/workflows/execution-remediation-v6.yml").read_text()
          marker = "            python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])

          registry_start = script.index('registry = "crates/athanor-app/src/project_registry.rs"')
          moves_start = script.index("moves = [", registry_start)
          registry_code = '''registry = "crates/athanor-app/src/project_registry.rs"
          old_registry = (
              "    if backup.exists() {\\n"
              "        if let Err(error) = fs::remove_file(&backup) {\\n"
              "            warn!(\\n"
              "                backup = %backup.display(),\\n"
              "                error = %error,\\n"
              "                \\\"project registry was published but backup cleanup failed\\\"\\n"
              "            );\\n"
              "        }\\n"
              "    }"
          )
          new_registry = (
              "    if backup.exists()\\n"
              "        && let Err(error) = fs::remove_file(&backup)\\n"
              "    {\\n"
              "        warn!(\\n"
              "            backup = %backup.display(),\\n"
              "            error = %error,\\n"
              "            \\\"project registry was published but backup cleanup failed\\\"\\n"
              "        );\\n"
              "    }"
          )
          replace_once(registry, old_registry, new_registry)

          '''
          script = script[:registry_start] + registry_code + script[moves_start:]

          wrappers_start = script.index("wrappers = [")
          lib_start = script.index(
              'replace_once(\n    "crates/athanor-app/src/lib.rs"',
              wrappers_start,
          )
          wrappers_code = '''def replace_glob_wrapper(path: str, included: str, module: str) -> None:
              replace_once(
                  path,
                  "mod current {\\n    include!(\\\"" + included + "\\\");\\n}",
                  "mod " + module + ";",
              )
              replace_once(path, "pub use current::*;", "pub use " + module + "::*;")

          replace_glob_wrapper(
              "crates/athanor-app/src/repair/mod.rs",
              "repair_cleanup_recovery.rs",
              "cleanup_recovery",
          )
          replace_glob_wrapper(
              "crates/athanor-app/src/repair/cleanup_recovery.rs",
              "repair_recovery.rs",
              "recovery",
          )
          replace_glob_wrapper(
              "crates/athanor-app/src/repair/cleanup_recovery/recovery.rs",
              "repair_retention_guard.rs",
              "retention_guard",
          )

          retention_guard = "crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard.rs"
          replace_once(
              retention_guard,
              "mod current {\\n    include!(\\\"repair_retention.rs\\\");\\n}",
              "mod retention;",
          )
          replace_once(retention_guard, "pub use current::{", "pub use retention::{")
          retention_guard_text = Path(retention_guard).read_text()
          if retention_guard_text.count("current::") != 1:
              raise SystemExit("retention_guard: expected one current:: call")
          Path(retention_guard).write_text(retention_guard_text.replace("current::", "retention::", 1))

          replace_glob_wrapper(
              "crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention.rs",
              "repair_guard.rs",
              "guard",
          )

          guard = "crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention/guard.rs"
          replace_once(
              guard,
              "mod current {\\n    include!(\\\"repair_pointer.rs\\\");\\n}",
              "mod pointer;",
          )
          replace_once(guard, "pub use current::{", "pub use pointer::{")
          guard_text = Path(guard).read_text()
          if guard_text.count("current::") != 1:
              raise SystemExit("guard: expected one current:: call")
          Path(guard).write_text(guard_text.replace("current::", "pointer::", 1))

          pointer = "crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention/guard/pointer.rs"
          replace_once(
              pointer,
              "mod legacy {\\n    include!(\\\"repair.rs\\\");\\n}",
              "mod legacy;",
          )

          '''
          script = script[:wrappers_start] + wrappers_code + script[lib_start:]
          exec(compile(script, "execution-remediation-v8", "exec"))
          for workflow_path in [
              ".github/workflows/execution-remediation-v7.yml",
              ".github/workflows/execution-remediation-v8.yml",
          ]:
              Path(workflow_path).unlink()
          PY
            cargo update -p oxc_parser@0.138.0 --precise 0.139.0
            cargo fmt --all
            cargo fmt --all -- --check
            cargo check --workspace --all-features --locked
            cargo test -p ath --test executable_shared_report_cli --locked
            cargo clippy --workspace --all-targets --locked -- -D warnings
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          } 2>&1 | tee "$RUNNER_TEMP/execution-remediation-v8.log"
      - name: Upload remediation diagnostics
        if: ${{ failure() && steps.remediate.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: execution-remediation-v8-diagnostics
          path: ${{ runner.temp }}/execution-remediation-v8.log
          if-no-files-found: error
          retention-days: 14
      - name: Commit validated remediation
        id: commit
        if: ${{ steps.remediate.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          allowed="$RUNNER_TEMP/allowed-paths"
          cat > "$allowed" <<'EOF'
          .github/workflows/execution-remediation-v4.yml
          .github/workflows/execution-remediation-v5.yml
          .github/workflows/execution-remediation-v6.yml
          .github/workflows/execution-remediation-v7.yml
          .github/workflows/execution-remediation-v8.yml
          .github/workflows/source-warning-remediation-v2.yml
          .github/workflows/source-warning-remediation-v3.yml
          Cargo.lock
          Cargo.toml
          apps/ath/src/entry.rs
          crates/athanor-app/src/application_report_composition/docs_direct/apply.rs
          crates/athanor-app/src/application_report_composition/docs_direct/propose.rs
          crates/athanor-app/src/daemon_queries.rs
          crates/athanor-app/src/docs.rs
          crates/athanor-app/src/docs/frontmatter.rs
          crates/athanor-app/src/json_contract_base.rs
          crates/athanor-app/src/lib.rs
          crates/athanor-app/src/project_registry.rs
          crates/athanor-app/src/repair.rs
          crates/athanor-app/src/repair/mod.rs
          crates/athanor-app/src/repair/cleanup_recovery.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention/guard.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention/guard/pointer.rs
          crates/athanor-app/src/repair/cleanup_recovery/recovery/retention_guard/retention/guard/pointer/legacy.rs
          crates/athanor-app/src/repair_cleanup_recovery.rs
          crates/athanor-app/src/repair_guard.rs
          crates/athanor-app/src/repair_latest.rs
          crates/athanor-app/src/repair_pointer.rs
          crates/athanor-app/src/repair_recovery.rs
          crates/athanor-app/src/repair_retention.rs
          crates/athanor-app/src/repair_retention_guard.rs
          crates/athanor-app/src/runtime/trust.rs
          crates/athanor-app/src/rustok_architecture.rs
          EOF
          sort -o "$allowed" "$allowed"
          git diff --name-only | sort > "$RUNNER_TEMP/actual-paths"
          diff -u "$allowed" "$RUNNER_TEMP/actual-paths"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix(ci): close execution blockers"
          git push origin HEAD:main
      - name: Publish exact remediation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REMEDIATION_OUTCOME: ${{ steps.remediate.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state="failure"
          description="Execution remediation v8 failed"
          if [[ "$REMEDIATION_OUTCOME" == "success" && "$COMMIT_OUTCOME" == "success" ]]; then
            state="success"
            description="Execution remediation v8 passed"
          fi
          export STATE="$state"
          export DESCRIPTION="$description"
          python - <<'PY' > status.json
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "target_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "description": os.environ["DESCRIPTION"],
              "context": "athanor/execution-remediation-v8",
          }))
          PY
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data @status.json
