name: Format API-001
# Git-data activation for the registered branch workflow.

on:
  push:
    branches: [automation/api-001-public-contract]
    paths:
      - ".github/workflows/format-api-001.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: format-api-001
  cancel-in-progress: true

jobs:
  format:
    name: Apply repository Rust formatting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=athanor/api-001-format \
            -f description="Canonical API-001 formatting is running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: automation/api-001-public-contract
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Apply canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          rm .github/workflows/format-api-001.yml
          git diff --check

      - name: Publish formatted branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(api): apply canonical rustfmt"
          git push origin HEAD:automation/api-001-public-contract

      - name: Publish final status
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description="Canonical API-001 formatting failed"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Canonical API-001 formatting applied"
          fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context=athanor/api-001-format \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          test "$state" = success
