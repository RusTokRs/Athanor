name: DOCGEN Rustok Evaluation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docgen-rustok-evaluation.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: docgen-rustok-evaluation-main
  cancel-in-progress: false

env:
  RUSTOK_REVISION: 3b76a530c82c0faaed22ccec384d4fd950811862

jobs:
  evaluate:
    name: Generate bounded Rustok architecture documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out Athanor
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install repository Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Check out pinned bounded RusTok source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: RusTokRs/RusTok
          ref: ${{ env.RUSTOK_REVISION }}
          path: target/rustok-evaluation/source
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Cargo.toml
            README.md
            modules.toml
            apps/server/Cargo.toml
            apps/server/src/modules
            crates/rustok-modules/Cargo.toml
            crates/rustok-modules/src
            crates/rustok-product/Cargo.toml
            crates/rustok-product/src
            docs/backend/module-backend-architecture.md
            docs/modules/registry.md

      - name: Build Athanor CLI
        shell: bash
        run: cargo build -p ath --locked

      - name: Index and generate exact-snapshot documentation
        shell: bash
        env:
          SOURCE_ROOT: ${{ github.workspace }}/target/rustok-evaluation/source
          OUTPUT_ROOT: ${{ runner.temp }}/rustok-docgen-evaluation
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_ROOT"
          find "$SOURCE_ROOT" -type f -not -path '*/.git/*' -print0 \
            | sort -z \
            | xargs -0 -r stat --printf='%n\t%s\n' \
            > "$OUTPUT_ROOT/source-files.tsv"

          target/debug/ath index "$SOURCE_ROOT" --json > "$OUTPUT_ROOT/index.json"
          snapshot="$(jq -er '.snapshot' "$OUTPUT_ROOT/index.json")"

          target/debug/ath docs generate-architecture "$SOURCE_ROOT" \
            --snapshot "$snapshot" \
            --max-entities 96 \
            --max-facts 192 \
            --max-relations 192 \
            --max-diagnostics 96 \
            --json > "$OUTPUT_ROOT/generation.json"

          target/debug/ath docs architecture current "$SOURCE_ROOT" --json \
            > "$OUTPUT_ROOT/current.json"
          target/debug/ath docs architecture manifest "$SOURCE_ROOT" --json \
            > "$OUTPUT_ROOT/manifest.json"
          target/debug/ath docs architecture validation "$SOURCE_ROOT" --json \
            > "$OUTPUT_ROOT/validation.json"

          target/debug/ath docs generate-architecture "$SOURCE_ROOT" \
            --snapshot "$snapshot" \
            --max-entities 96 \
            --max-facts 192 \
            --max-relations 192 \
            --max-diagnostics 96 \
            --json > "$OUTPUT_ROOT/repeated-generation.json"

          document="$(jq -er '.document' "$OUTPUT_ROOT/generation.json")"
          cp "$document" "$OUTPUT_ROOT/architecture.md"
          sha256sum "$OUTPUT_ROOT/architecture.md" > "$OUTPUT_ROOT/architecture.sha256"

      - name: Build evaluation summary
        shell: bash
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/rustok-docgen-evaluation
          ATHANOR_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ["OUTPUT_ROOT"])
          load = lambda name: json.loads((root / name).read_text(encoding="utf-8"))
          index = load("index.json")
          generation = load("generation.json")
          repeated = load("repeated-generation.json")
          current = load("current.json")
          manifest = load("manifest.json")
          validation = load("validation.json")
          markdown = (root / "architecture.md").read_text(encoding="utf-8")
          source_rows = [line.split("\t", 1) for line in (root / "source-files.tsv").read_text().splitlines()]

          headings = [
              "System Overview",
              "Components",
              "Relationships",
              "Diagnostics",
          ]
          report = validation["report"]
          manifest_value = manifest["manifest"]
          summary = {
              "schema": "athanor.documentation_rustok_evaluation.v1",
              "athanor_source": os.environ["ATHANOR_SHA"],
              "rustok_repository": "RusTokRs/RusTok",
              "rustok_revision": os.environ["RUSTOK_REVISION"],
              "source_subset": {
                  "files": len(source_rows),
                  "bytes": sum(int(size) for _, size in source_rows),
              },
              "snapshot": index["snapshot"],
              "generation": generation["generation"],
              "generation_status": generation["status"],
              "repeat_status": repeated["status"],
              "repeat_generation_matches": repeated["generation"] == generation["generation"],
              "current_generation_matches": current["current"]["generation"] == generation["generation"],
              "manifest_artifacts": len(manifest_value["documents"]),
              "manifest_omitted": manifest_value["omitted"],
              "validation_status": report["status"],
              "quality_metrics": report["metrics"],
              "sections": {heading: f"## {heading}" in markdown for heading in headings},
              "mermaid_edges": len(re.findall(r"^\s*[^\n]+-->(?:\|[^|]+\|)?[^\n]+$", markdown, re.MULTILINE)),
              "citation_footnotes": len(re.findall(r"^\[\^[^\]]+\]:", markdown, re.MULTILINE)),
              "unsupported_relation_disclosed": "unsupported" in markdown.lower(),
              "deterministic_repeatability": (
                  repeated["status"] == "up_to_date"
                  and repeated["generation"] == generation["generation"]
              ),
          }
          (root / "evaluation-summary.json").write_text(
              json.dumps(summary, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload evaluation artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docgen-rustok-evaluation
          path: ${{ runner.temp }}/rustok-docgen-evaluation
          if-no-files-found: error
          retention-days: 14

      - name: Publish exact evaluation status
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = success ]; then
            state=success
            description="bounded Rustok documentation evaluation succeeded"
          else
            state=failure
            description="bounded Rustok documentation evaluation failed"
          fi
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/$SHA" \
            -d "$(jq -nc --arg state "$state" --arg target_url "$RUN_URL" --arg description "$description" '{state:$state,context:"athanor/rustok-docgen-evaluation",description:$description,target_url:$target_url}')"
