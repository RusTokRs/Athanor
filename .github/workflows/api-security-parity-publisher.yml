name: API Security Parity Publisher

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: api-security-parity-publisher-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.head_ref == 'automation/api-001-security-parity'
    runs-on: macos-15-intel
    timeout-minutes: 45
    steps:
      - name: Check out head branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install repository Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy rustfmt

      - name: Verify staged source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object scripts/automation/api_security_parity_patch.py)" = "f9b96fb7a1a0196856da7d7683ac8e46fbb2d2de"
          test "$(git hash-object scripts/automation/api_security_parser_patch.py)" = "6e049364e9c08a6ce40117494e020a0139198b16"
          test "$(git hash-object crates/athanor-checker-api/src/security_parity.rs)" = "16ccd256ced26b8b322e8ad92af573fb0596afac"
          python3 -m py_compile scripts/automation/api_security_parity_patch.py
          python3 -m py_compile scripts/automation/api_security_parser_patch.py

      - name: Apply bounded API security parity patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/automation/api_security_parity_patch.py
          python3 scripts/automation/api_security_parser_patch.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path("crates/athanor-extractor-openapi/src/implementation.rs")
          source = path.read_text(encoding="utf-8")
          old = "tokenUrl: /token"
          if source.count(old) != 1:
              raise SystemExit(f"expected one OAuth test token URL, found {source.count(old)}")
          path.write_text(source.replace(old, "tokenUrl: https://example.test/token"), encoding="utf-8")
          PY

      - name: Format workspace
        run: cargo fmt --all

      - name: Test affected packages
        shell: bash
        run: |
          set -o pipefail
          cargo test -p athanor-extractor-openapi -p athanor-extractor-graphql -p athanor-checker-api --locked 2>&1 | tee api-security-tests.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: api-security-parity-test-diagnostics
          path: api-security-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Lint affected packages
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p athanor-extractor-openapi -p athanor-extractor-graphql -p athanor-checker-api --all-targets --locked -- -D warnings 2>&1 | tee api-security-clippy.log

      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: api-security-parity-clippy-diagnostics
          path: api-security-clippy.log
          if-no-files-found: error
          retention-days: 7

      - name: Publish clean product tree
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/api-security-parity-publisher.yml
          rm scripts/automation/api_security_parity_patch.py
          rm scripts/automation/api_security_parser_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/athanor-extractor-openapi/src/implementation.rs \
                  crates/athanor-extractor-openapi/src/parser.rs \
                  crates/athanor-extractor-graphql/src/lib.rs \
                  crates/athanor-checker-api/src/lib.rs \
                  crates/athanor-checker-api/src/security_parity.rs \
                  docs/adapters/checker-api.md \
                  docs/development/roadmap-status.md \
                  athanor_implementation_plan_ru.md \
                  .github/workflows/api-security-parity-publisher.yml \
                  scripts/automation/api_security_parity_patch.py \
                  scripts/automation/api_security_parser_patch.py
          git commit -m "feat(api): compare status and security contracts"
          git push origin HEAD:${{ github.head_ref }}
