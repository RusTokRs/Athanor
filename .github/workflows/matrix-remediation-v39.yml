name: Dispatch Matrix Remediation V40

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/matrix-remediation-v39.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: matrix-remediation-v40-dispatch-main
  cancel-in-progress: true

jobs:
  dispatch:
    name: Dispatch registered V40 workflow
    runs-on: ubuntu-latest
    steps:
      - name: Start V40 on current main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh workflow run matrix-remediation-v40.yml --ref main
