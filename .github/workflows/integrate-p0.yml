name: Integrate P0 Remediation

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'agent/integrate-p0-remediation' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Cherry-pick SurrealDB remediation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/fix-surrealdb-remote-conformance
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for commit in \
            d7450b5423ea36a49d1bdf17cb2ce4a3b3902fc7 \
            f8b27464721f19f9a3f2140502315c8a603a65a0 \
            3876fcc55071d0c80a2d830df172c4a6c04e36ac
          do
            if git merge-base --is-ancestor "$commit" HEAD; then
              continue
            fi
            git cherry-pick "$commit"
          done
          git push origin "HEAD:${{ github.head_ref }}"
