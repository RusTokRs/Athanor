name: Integrate P0 Remediation

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'agent/integrate-p0-remediation' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - name: Cherry-pick validated implementation commits
        shell: bash
        run: |
          set -euo pipefail
          commits=(
            d57d6f7f345d945509752380f602947a1e9dfd0e
            c1aae3ff533b1967b3aa6c3fbc136302ab0d5ad5
            d7450b5423ea36a49d1bdf17cb2ce4a3b3902fc7
            f8b27464721f19f9a3f2140502315c8a603a65a0
            3876fcc55071d0c80a2d830df172c4a6c04e36ac
          )
          git fetch origin agent/fix-windows-athd-stack agent/fix-surrealdb-remote-conformance
          changed=false
          for commit in "${commits[@]}"; do
            if git merge-base --is-ancestor "$commit" HEAD; then
              continue
            fi
            git cherry-pick "$commit"
            changed=true
          done
          if [[ "$changed" == false ]]; then
            echo "Validated implementation commits already integrated"
            exit 0
          fi
          git push origin "HEAD:${{ github.head_ref }}"
