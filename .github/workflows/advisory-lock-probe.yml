name: Advisory CI Finalizer

on:
  pull_request:

permissions:
  contents: read

jobs:
  finalize:
    if: github.head_ref == 'agent/restore-ci-baseline' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - name: Generate permanent remediation workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ci.yml')
          source = workflow.read_text()
          old = 'cargo update -p ammonia --precise 4.1.3'
          new = 'cargo update -p ammonia --precise 4.1.4'
          if source.count(old) != 1:
              raise SystemExit(f'expected exactly one stale ammonia remediation, found {source.count(old)}')
          workflow.write_text(source.replace(old, new))
          PY
      - name: Upload permanent CI workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-ammonia-4.1.4
          path: .github/workflows/ci.yml
          if-no-files-found: error
          retention-days: 1
