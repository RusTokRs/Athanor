name: Advisory Lock Finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/restore-ci-baseline' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Finalize permanent remediation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ci.yml')
          source = workflow.read_text()
          old = 'cargo update -p ammonia --precise 4.1.3'
          new = 'cargo update -p ammonia --precise 4.1.4'
          count = source.count(old)
          if count == 1:
              workflow.write_text(source.replace(old, new))
          elif count != 0:
              raise SystemExit(f'expected at most one stale ammonia remediation, found {count}')
          PY
          git add .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "CI remediation already targets ammonia 4.1.4"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci(security): retain safe ammonia remediation"
          git push origin "HEAD:${{ github.head_ref }}"
