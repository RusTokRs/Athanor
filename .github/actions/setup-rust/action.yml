name: Setup Rust 1.95
description: Install the workspace Rust toolchain with optional components and targets.

inputs:
  components:
    description: Space-separated rustup components to install.
    required: false
    default: ""
  targets:
    description: Space-separated rustup targets to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust 1.95.0
      shell: bash
      env:
        COMPONENTS: ${{ inputs.components }}
        TARGETS: ${{ inputs.targets }}
        RUSTUP_PERMIT_COPY_RENAME: "1"
      run: |
        set -euo pipefail

        args=(toolchain install 1.95.0 --profile minimal --no-self-update)
        for component in $COMPONENTS; do
          args+=(--component "$component")
        done
        for target in $TARGETS; do
          args+=(--target "$target")
        done

        installed=false
        for attempt in 1 2 3; do
          if rustup "${args[@]}"; then
            installed=true
            break
          fi
          if [[ "$attempt" -lt 3 ]]; then
            sleep $((attempt * 10))
          fi
        done
        if [[ "$installed" != true ]]; then
          echo "failed to install Rust 1.95.0 after three attempts" >&2
          exit 1
        fi

        rustup default 1.95.0
        rustc --version --verbose
        cargo --version
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
