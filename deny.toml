# cargo-deny configuration

[advisories]
version = 2
db-path = "~/.cargo/advisories"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "BSL-1.0",
    "Unlicense",
    "Zlib",
]
exceptions = [
    { allow = ["BUSL-1.1"], name = "surrealdb", version = "*" },
    { allow = ["BUSL-1.1"], name = "surrealdb-core", version = "*" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
